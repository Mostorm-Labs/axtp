id: audio_device
name: AXTP Audio Algorithm Device
capabilities:
  - id: audio.algorithm
    features:
      autoGainControl:
        registered: true
        supported: false
    methods:
      - audio.getAlgorithmCapabilities
      - audio.getAlgorithmConfig
      - audio.setAlgorithmConfig
      - audio.resetAlgorithmConfig
    events:
      - audio.algorithmConfigChanged

methods:
  audio.getAlgorithmCapabilities:
    result:
      capability: audio.algorithm
      updatePolicy:
        partialUpdateSupported: true
        multiAlgorithmUpdateSupported: true
        atomicUpdateSupported: true
  audio.getAlgorithmConfig:
    result:
      noiseSuppression:
        enabled: true
        level: 1
  audio.setAlgorithmConfig:
    result:
      applyState: applied
      requiresAudioRestart: false
      config:
        noiseSuppression:
          enabled: false
          level: 1
