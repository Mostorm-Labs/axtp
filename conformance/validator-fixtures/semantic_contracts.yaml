  - name: unsubscribe_suppression_positive
    valid: true
    id: fixture.unsubscribe_positive
    title: *title
    since: *since
    level: *level
    profiles: *profiles
    given: &event_given { event: vendor.changed }
    semantic: { kind: unsubscribed_event_sender_suppression }
    steps:
      - { id: unsubscribe, role: precondition, direction: client_to_server, jsonrpc: { op: REIDENTIFY, sid: ready, d: { eventMasks: "" } } }
      - { id: unsubscribe_response, role: precondition, responseTo: unsubscribe, direction: server_to_client, expect: { jsonrpc: { op: IDENTIFIED, sid: { type: string, minLength: 1 } } } }
      - { id: request, role: trigger, triggeredBy: unsubscribe_response, direction: client_to_server, rpc: { op: REQUEST, requestId: 1, method: vendor.change, params: {} } }
      - { id: response, role: trigger, responseTo: request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 1, statusCode: SUCCESS } } }
      - { id: observation, role: observe, triggeredBy: response, direction: client_observes, expect: { no_event: { name: vendor.changed, withinMs: 50 } } }
      - { id: live_request, role: liveness, triggeredBy: observation, direction: client_to_server, rpc: { op: REQUEST, requestId: 2, method: vendor.live, params: {} } }
      - { id: live_response, role: liveness, responseTo: live_request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 2, statusCode: SUCCESS } } }
    assertions: *assertions
