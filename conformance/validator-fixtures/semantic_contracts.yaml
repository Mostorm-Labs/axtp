  - name: unknown_event_positive
    valid: true
    id: fixture.unknown_event_positive
    title: *title
    since: *since
    level: *level
    profiles: *profiles
    given: *given
    semantic: { kind: unknown_event_receiver_tolerance }
    steps: &unknown_event_steps
      - { id: input, role: input, direction: peer_to_runtime, jsonrpc: { op: EVENT, sid: ready, d: { event: vendor.future } } }
      - { id: disposition, role: observe, triggeredBy: input, direction: runtime_local, expect: { compatibility_input: { kind: compatibility_fuzz, outcome: { oneOf: [ignored, diagnostic_only] }, applicationDispatched: false, sessionState: APP_READY } } }
      - { id: live_request, role: liveness, triggeredBy: disposition, direction: client_to_server, rpc: { op: REQUEST, requestId: 2, method: vendor.live, params: {} } }
      - { id: live_response, role: liveness, responseTo: live_request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 2, statusCode: SUCCESS } } }
    assertions: *assertions
  - name: unknown_event_wrong_disposition_edge_and_kind
    valid: false
    id: fixture.unknown_event_negative
    title: *title
    since: *since
    level: *level
    profiles: *profiles
    given: *given
    semantic: { kind: unknown_event_receiver_tolerance }
    steps:
      - { id: input, role: input, direction: peer_to_runtime, jsonrpc: { op: EVENT, sid: ready, d: { event: vendor.future } } }
      - { id: unrelated, role: precondition, direction: runtime_local, expect: { wire: { ready: true } } }
      - { id: disposition, role: observe, triggeredBy: unrelated, direction: runtime_local, expect: { compatibility_input: { kind: unknown_event, outcome: ignored, applicationDispatched: false, sessionState: APP_READY } } }
      - { id: live_request, role: liveness, triggeredBy: disposition, direction: client_to_server, rpc: { op: REQUEST, requestId: 2, method: vendor.live, params: {} } }
      - { id: live_response, role: liveness, responseTo: live_request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 2, statusCode: SUCCESS } } }
    assertions: *assertions
