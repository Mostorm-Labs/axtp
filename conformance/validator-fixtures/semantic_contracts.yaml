tests:
  - name: baseline_handshake_positive
    valid: true
    id: fixture.baseline_positive
    title: &title Semantic validator fixture
    since: &since spec/v0.0.2
    level: &level core
    profiles: &profiles [core]
    given: &given {}
    semantic: { kind: baseline_handshake }
    steps: &baseline_steps
      - { id: hello, role: input, direction: server_to_client, expect: { jsonrpc: { op: HELLO, sid: "", d: {} } } }
      - { id: identify, role: trigger, direction: client_to_server, jsonrpc: { op: IDENTIFY, sid: "", d: {} } }
      - { id: identified, role: observe, responseTo: identify, direction: server_to_client, expect: { jsonrpc: { op: IDENTIFIED, sid: { type: string, minLength: 1 } } } }
    assertions: &assertions [semantic contract holds]

  - name: baseline_handshake_empty_sid
    valid: false
    id: fixture.baseline_negative
    title: *title
    since: *since
    level: *level
    profiles: *profiles
    given: *given
    semantic: { kind: baseline_handshake }
    steps:
      - { id: hello, role: input, direction: server_to_client, expect: { jsonrpc: { op: HELLO, sid: "", d: {} } } }
      - { id: identify, role: trigger, direction: client_to_server, jsonrpc: { op: IDENTIFY, sid: "", d: {} } }
      - { id: identified, role: observe, responseTo: identify, direction: server_to_client, expect: { jsonrpc: { op: IDENTIFIED, sid: { type: string, minLength: 0 } } } }
    assertions: *assertions

  - name: advisory_handshake_positive
    valid: true
    id: fixture.advisory_positive
    title: *title
    since: *since
    level: *level
    profiles: *profiles
    given: *given
    semantic: { kind: advisory_version_handshake, requiredRows: [1.0.0->1.1.0] }
    scenarios:
      - name: row
        given: { client_axtp_version: 1.1.0 }
        steps: &advisory_steps
          - { id: hello, role: input, direction: server_to_client, jsonrpc: { op: HELLO, sid: "", d: { axtpVersion: 1.0.0 } } }
          - { id: identify, role: trigger, direction: client_to_server, jsonrpc: { op: IDENTIFY, sid: "", d: {} } }
          - { id: identified_response, role: observe, responseTo: identify, captureAs: identified, direction: server_to_client, expect: { jsonrpc: { op: IDENTIFIED, sid: { type: string, minLength: 1 } } } }
          - { id: reidentify, role: liveness, triggeredBy: identified_response, direction: client_to_server, jsonrpc: { op: REIDENTIFY, sid: { ref: identified.sid }, d: {} } }
          - { id: reidentified_response, role: liveness, responseTo: reidentify, captureAs: reidentified, direction: server_to_client, expect: { jsonrpc: { op: IDENTIFIED, sid: { type: string, minLength: 1 } } } }
        assertions: *assertions

  - name: advisory_handshake_wrong_required_row
    valid: false
    id: fixture.advisory_negative
    title: *title
    since: *since
    level: *level
    profiles: *profiles
    given: *given
    semantic: { kind: advisory_version_handshake, requiredRows: [2.0.0->1.1.0] }
    scenarios:
      - name: row
        given: { client_axtp_version: 1.1.0 }
        steps: *advisory_steps
        assertions: *assertions

