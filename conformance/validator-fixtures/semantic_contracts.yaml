      - { id: degraded, role: degraded, responseTo: request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 1, statusCode: NOT_SUPPORTED } } }
      - { id: extra, role: degraded, responseTo: request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 1, statusCode: NOT_SUPPORTED } } }
      - { id: live_request, role: liveness, triggeredBy: degraded, direction: client_to_server, rpc: { op: REQUEST, requestId: 2, method: vendor.live, params: {} } }
