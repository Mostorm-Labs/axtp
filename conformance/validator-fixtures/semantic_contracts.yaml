      - { id: response, role: trigger, responseTo: request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 1, statusCode: SUCCESS } } }
      - { id: observation, role: observe, triggeredBy: response, direction: client_observes, expect: { no_event: { name: vendor.changed, withinMs: 50 } } }
      - { id: live_request, role: liveness, triggeredBy: observation, direction: client_to_server, rpc: { op: REQUEST, requestId: 2, method: vendor.live, params: {} } }
      - { id: live_response, role: liveness, responseTo: live_request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 2, statusCode: SUCCESS } } }
