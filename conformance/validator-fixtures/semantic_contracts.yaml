    semantic: { kind: invalid_params }
    steps: &invalid_steps
      - { id: request, role: trigger, direction: client_to_server, rpc: { op: REQUEST, requestId: 1, method: vendor.method, params: {} } }
      - { id: degraded, role: degraded, responseTo: request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 1, statusCode: OUT_OF_RANGE } } }
      - { id: live_request, role: liveness, triggeredBy: degraded, direction: client_to_server, rpc: { op: REQUEST, requestId: 2, method: vendor.live, params: {} } }
      - { id: live_response, role: liveness, responseTo: live_request, direction: server_to_client, expect: { rpc: { op: REQUEST_RESPONSE, requestId: 2, statusCode: SUCCESS } } }
