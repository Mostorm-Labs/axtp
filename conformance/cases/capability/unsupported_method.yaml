id: capability.unsupported_method
title: Unknown method uses exact RPC_METHOD_NOT_FOUND
since: spec/v0.0.2
level: capability
semantic:
  kind: unknown_method_error
profiles:
  - capability
  - core

given:
  method: vendor.unsupported

steps:
  - id: unknown_request
    role: trigger
    direction: client_to_server
    rpc:
      encoding: json
      op: REQUEST
      requestId: 4
      method: vendor.unsupported
      params: {}

  - id: not_found_response
    role: degraded
    responseTo: unknown_request
    direction: server_to_client
    expect:
      rpc:
        op: REQUEST_RESPONSE
        requestId: 4
        statusCode: RPC_METHOD_NOT_FOUND

  - id: liveness_request
    role: liveness
    triggeredBy: not_found_response
    direction: client_to_server
    rpc: { encoding: json, op: REQUEST, requestId: 5, method: audio.getAlgorithmConfig, params: {} }

  - id: liveness_response
    role: liveness
    responseTo: liveness_request
    direction: server_to_client
    expect: { rpc: { op: REQUEST_RESPONSE, requestId: 5, statusCode: SUCCESS } }

assertions:
  - response.requestId == request.requestId
  - response.statusCode == RPC_METHOD_NOT_FOUND
