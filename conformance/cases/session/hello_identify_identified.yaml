id: session.hello_identify_identified
title: HELLO / IDENTIFY / IDENTIFIED session setup
since: spec/v0.0.2
level: websocket-jsonrpc
semantic:
  kind: baseline_handshake
profiles:
  - websocket-jsonrpc

given:
  transport: websocket_jsonrpc

steps:
  - id: hello
    role: input
    direction: server_to_client
    expect:
      jsonrpc:
        sid: ""
        op: HELLO
        d: {}

  - id: identify
    role: trigger
    direction: client_to_server
    jsonrpc:
      sid: ""
      op: IDENTIFY
      d:
        randomSeed: 305419896

  - id: identified_response
    role: observe
    responseTo: identify
    direction: server_to_client
    expect:
      jsonrpc:
        op: IDENTIFIED
        sid:
          type: string
          minLength: 1

assertions:
  - identified.sid != ""
  - identified.d == {}
