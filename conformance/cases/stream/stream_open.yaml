id: stream.stream_open
title: Media STREAM context is opened by RPC control plane
since: spec/v0.0.2
level: stream
profiles:
  - stream
  - framed-binary

given:
  transport: standard_frame

steps:
  - direction: client_to_server
    rpc:
      op: REQUEST
      requestId: 200
      method: video.openStream
      params:
        streamProfile: media.video
        source: conformance_test
        codec: h264

  - direction: server_to_client
    expect:
      rpc:
        op: REQUEST_RESPONSE
        requestId: 200
        result:
          streamId:
            gt: 0
          streamProfile: media.video

assertions:
  - streamId > 0
  - streamId != 0
  - streamProfile == media.video
