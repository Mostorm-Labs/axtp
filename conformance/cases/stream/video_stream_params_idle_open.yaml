id: stream.video_stream_params_idle_open
title: Idle NT10 source opens video directly with requested encoder parameters
since: spec/v0.0.2
level: stream
profiles:
  - stream
  - framed-binary

given:
  session:
    state: identified
    id: cast-session-17
  source:
    id: wireless_cast_video
    state: receiving
    active_video_stream: false
    active_audio_stream: false
    frameRates: [1, 24, 30, 60]
    bitratesKbps: [256, 4000, 6000, 12000]
    supportsReconfigure: true
  capability:
    cast.flowControl:
      supportsVideoStreamParams: true

steps:
  - id: set_params
    role: trigger
    direction: client_to_server
    rpc:
      op: REQUEST
      requestId: 620
      method: cast.setVideoStreamParams
      params:
        sessionId: cast-session-17
        frameRate: 30
        bitrateKbps: 6000

  - id: set_accepted
    role: observe
    responseTo: set_params
    direction: server_to_client
    expect:
      rpc:
        op: REQUEST_RESPONSE
        requestId: 620
        result:
          accepted: true
          state: pending
          sessionId: cast-session-17
          sourceVideo:
            type: object

  - id: direct_open
    role: observe
    triggeredBy: set_accepted
    direction: server_to_client
    rpc:
      op: REQUEST
      requestId: 621
      method: video.openStream
      params:
        source: wireless_cast_video
        peerRole: transmitter
        codec: h264
        streamProfile: media.video
        syncGroupId: cast-av-idle-1
        castSessionId: cast-session-17
        frameRate: 30
        bitrateKbps: 6000

  - id: open_result
    role: observe
    responseTo: direct_open
    direction: client_to_server
    expect:
      rpc:
        op: REQUEST_RESPONSE
        requestId: 621
        statusCode: SUCCESS
        result:
          streamId:
            gt: 0
          state:
            oneOf: [opening, streaming]
          source: wireless_cast_video
          peerRole: transmitter
          codec: h264
          frameRate: 30
          bitrateKbps: 6000
          streamProfile: media.video
          syncGroupId: cast-av-idle-1

  - id: open_audio
    role: observe
    triggeredBy: open_result
    direction: server_to_client
    rpc:
      op: REQUEST
      requestId: 622
      method: audio.openStream
      params:
        source: wireless_cast_audio
        peerRole: transmitter
        codec: aac
        transportFormat: adts
        sampleFormat: aac
        streamProfile: media.audio
        syncGroupId: cast-av-idle-1
        castSessionId: cast-session-17
        cursorUnit: sourceCaptureTimestampUs
        audioPtsMode: derivedFromSeq
        timebase: 48000
        sampleRate: 48000
        channels: 2
        samplesPerPacket: 1024
        firstMediaSeqId: 0
        audioPtsBase: 0
        packetizationMode: fixedSamplesPerPacket

  - id: open_audio_result
    role: observe
    responseTo: open_audio
    direction: client_to_server
    expect:
      rpc:
        op: REQUEST_RESPONSE
        requestId: 622
        statusCode: SUCCESS
        result:
          streamId:
            gt: 0
          state:
            oneOf: [opening, streaming]
          source: wireless_cast_audio
          peerRole: transmitter
          codec: aac
          transportFormat: adts
          sampleFormat: aac
          streamProfile: media.audio
          syncGroupId: cast-av-idle-1
          castSessionId: cast-session-17
          cursorUnit: sourceCaptureTimestampUs
          audioPtsMode: derivedFromSeq
          timebase: 48000
          sampleRate: 48000
          channels: 2
          samplesPerPacket: 1024
          firstMediaSeqId: 0
          audioPtsBase: 0
          packetizationMode: fixedSamplesPerPacket

assertions:
  - source.active_video_stream == false before set_params
  - source.active_audio_stream == false before set_params
  - set_params accepted with state pending
  - no video.closeStream or audio.closeStream is sent for an idle source
  - video.openStream is sent directly with frameRate == 30 and bitrateKbps == 6000
  - open_result.result.streamId > 0
  - open_result.result.frameRate == 30
  - open_result.result.bitrateKbps == 6000
  - open_result.result.streamProfile == media.video
  - open_result.result.syncGroupId == cast-av-idle-1
  - open_audio.params.codec == aac
  - open_audio.params.transportFormat == adts
  - open_audio.params.streamProfile == media.audio
  - open_audio.params.audioPtsMode == derivedFromSeq
  - open_audio.params.syncGroupId == cast-av-idle-1
  - open_audio_result.result.streamId > 0
  - open_audio_result.result.streamId != open_result.result.streamId
  - open_audio_result.result.syncGroupId == cast-av-idle-1
  - open_audio_result.result.syncGroupId == open_result.result.syncGroupId
