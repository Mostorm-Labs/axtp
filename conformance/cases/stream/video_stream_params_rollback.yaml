id: stream.video_stream_params_rollback
title: Failed NT10 AV reconfiguration rolls back the complete audio/video pair
since: spec/v0.0.2
level: stream
profiles:
  - stream
  - framed-binary

given:
  session:
    state: identified
    id: cast-session-17
  source:
    id: wireless_cast_video
    frameRates: [1, 24, 25, 30, 60]
    bitratesKbps: [256, 4000, 6000, 12000]
    supportsReconfigure: true
  capability:
    cast.flowControl:
      supportsVideoStreamParams: true
      supportsActiveVideoReconfigure: true

scenarios:
  - name: reopen_failure_rolls_back
    given:
      client_axtp_version: 1.0.0
      session_state: identified
      active_video_stream:
        streamId: 5001
        frameRate: 25
        bitrateKbps: 4000
        sessionId: cast-session-17
        castSessionId: cast-session-17
        streamProfile: media.video
        syncGroupId: cast-av-17
      active_audio_stream:
        streamId: 5003
        source: wireless_cast_audio
        sessionId: cast-session-17
        castSessionId: cast-session-17
        syncGroupId: cast-av-17
        codec: aac
        transportFormat: adts
        sampleFormat: aac
        streamProfile: media.audio
        cursorUnit: sourceCaptureTimestampUs
        audioPtsMode: derivedFromSeq
        timebase: 48000
        sampleRate: 48000
        channels: 2
        samplesPerPacket: 1024
        firstMediaSeqId: 0
        audioPtsBase: 0
        packetizationMode: fixedSamplesPerPacket
      reopen_failure: MEDIA_BITRATE_UNSUPPORTED
    steps:
      - id: set_params
        role: trigger
        direction: client_to_server
        rpc:
          op: REQUEST
          requestId: 650
          method: cast.setVideoStreamParams
          params:
            sessionId: cast-session-17
            frameRate: 30
            bitrateKbps: 6000

      - id: set_pending
        role: observe
        responseTo: set_params
        direction: server_to_client
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 650
            result:
              accepted: true
              state: pending

      - id: close_old
        role: observe
        triggeredBy: set_pending
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 651
          method: video.closeStream
          params:
            streamId: 5001
            reason: encodingReconfigure

      - id: close_old_result
        role: observe
        responseTo: close_old
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 651
            statusCode: SUCCESS
            result:
              streamId: 5001
              state: closed

      - id: close_old_audio
        role: observe
        triggeredBy: close_old_result
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 652
          method: audio.closeStream
          params:
            streamId: 5003

      - id: close_old_audio_result
        role: observe
        responseTo: close_old_audio
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 652
            statusCode: SUCCESS
            result:
              streamId: 5003
              state: closed

      - id: open_new_audio
        role: observe
        triggeredBy: close_old_audio_result
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 653
          method: audio.openStream
          params:
            source: wireless_cast_audio
            peerRole: transmitter
            codec: aac
            transportFormat: adts
            sampleFormat: aac
            streamProfile: media.audio
            syncGroupId: cast-av-rollback-18
            castSessionId: cast-session-17
            cursorUnit: sourceCaptureTimestampUs
            audioPtsMode: derivedFromSeq
            timebase: 48000
            sampleRate: 48000
            channels: 2
            samplesPerPacket: 1024
            firstMediaSeqId: 0
            audioPtsBase: 0
            packetizationMode: fixedSamplesPerPacket

      - id: open_new_audio_result
        role: observe
        responseTo: open_new_audio
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 653
            statusCode: SUCCESS
            result:
              streamId: 5002
              state:
                oneOf: [opening, streaming]
              syncGroupId: cast-av-rollback-18
              codec: aac
              transportFormat: adts
              sampleFormat: aac
              streamProfile: media.audio
              cursorUnit: sourceCaptureTimestampUs
              audioPtsMode: derivedFromSeq
              timebase: 48000
              sampleRate: 48000
              channels: 2
              samplesPerPacket: 1024
              firstMediaSeqId: 0
              audioPtsBase: 0
              packetizationMode: fixedSamplesPerPacket

      - id: open_new
        role: observe
        triggeredBy: open_new_audio_result
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 654
          method: video.openStream
          params:
            source: wireless_cast_video
            peerRole: transmitter
            codec: h264
            streamProfile: media.video
            castSessionId: cast-session-17
            syncGroupId: cast-av-rollback-18
            frameRate: 30
            bitrateKbps: 6000

      - id: open_new_failed
        role: observe
        responseTo: open_new
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 654
            statusCode: MEDIA_BITRATE_UNSUPPORTED

      - id: close_partial_audio
        role: observe
        triggeredBy: open_new_failed
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 655
          method: audio.closeStream
          params:
            streamId: 5002

      - id: close_partial_audio_result
        role: observe
        responseTo: close_partial_audio
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 655
            statusCode: SUCCESS
            result:
              streamId: 5002
              state: closed

      - id: rollback_open
        role: observe
        triggeredBy: close_partial_audio_result
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 656
          method: video.openStream
          params:
            source: wireless_cast_video
            peerRole: transmitter
            codec: h264
            streamProfile: media.video
            castSessionId: cast-session-17
            syncGroupId: cast-av-rollback-19
            frameRate: 25
            bitrateKbps: 4000

      - id: rollback_open_result
        role: observe
        responseTo: rollback_open
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 656
            statusCode: SUCCESS
            result:
              streamId: 5004
              state:
                oneOf: [opening, streaming]
              syncGroupId: cast-av-rollback-19
              frameRate: 25
              bitrateKbps: 4000

      - id: rollback_open_audio
        role: observe
        triggeredBy: rollback_open_result
        direction: server_to_client
        rpc:
          op: REQUEST
          requestId: 657
          method: audio.openStream
          params:
            source: wireless_cast_audio
            peerRole: transmitter
            codec: aac
            transportFormat: adts
            sampleFormat: aac
            streamProfile: media.audio
            syncGroupId: cast-av-rollback-19
            castSessionId: cast-session-17
            cursorUnit: sourceCaptureTimestampUs
            audioPtsMode: derivedFromSeq
            timebase: 48000
            sampleRate: 48000
            channels: 2
            samplesPerPacket: 1024
            firstMediaSeqId: 0
            audioPtsBase: 0
            packetizationMode: fixedSamplesPerPacket

      - id: rollback_open_audio_result
        role: observe
        responseTo: rollback_open_audio
        direction: client_to_server
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 657
            statusCode: SUCCESS
            result:
              streamId: 5005
              state:
                oneOf: [opening, streaming]
              syncGroupId: cast-av-rollback-19
              codec: aac
              transportFormat: adts
              sampleFormat: aac
              streamProfile: media.audio
              cursorUnit: sourceCaptureTimestampUs
              audioPtsMode: derivedFromSeq
              timebase: 48000
              sampleRate: 48000
              channels: 2
              samplesPerPacket: 1024
              firstMediaSeqId: 0
              audioPtsBase: 0
              packetizationMode: fixedSamplesPerPacket

      - id: state_request
        role: liveness
        triggeredBy: rollback_open_audio_result
        direction: client_to_server
        rpc:
          op: REQUEST
          requestId: 658
          method: cast.getFlowControlState
          params: {}

      - id: state_result
        role: observe
        responseTo: state_request
        direction: server_to_client
        expect:
          rpc:
            op: REQUEST_RESPONSE
            requestId: 658
            statusCode: SUCCESS
            result:
              sourceVideo:
                type: object

    assertions:
      - close_old_result.result.state == closed
      - close_old_audio_result.result.state == closed
      - no replacement open is sent until both old streams are terminal closed
      - open_new.params.syncGroupId == cast-av-rollback-18
      - open_new.params.syncGroupId != cast-av-17
      - open_new.params.frameRate == 30
      - open_new.params.bitrateKbps == 6000
      - open_new_audio.params.syncGroupId == cast-av-rollback-18
      - open_new_audio.params.codec == aac
      - open_new_audio.params.transportFormat == adts
      - open_new_audio.params.streamProfile == media.audio
      - open_new_audio.params.audioPtsMode == derivedFromSeq
      - open_new_audio_result.result.streamId == 5002
      - open_new_failed.statusCode == MEDIA_BITRATE_UNSUPPORTED
      - close_partial_audio.params.streamId == 5002
      - close_partial_audio_result.result.state == closed
      - rollback_open.params.frameRate == 25
      - rollback_open.params.bitrateKbps == 4000
      - rollback_open_audio.params.codec == aac
      - rollback_open_audio.params.transportFormat == adts
      - rollback_open_audio.params.streamProfile == media.audio
      - rollback_open_audio.params.cursorUnit == sourceCaptureTimestampUs
      - rollback_open_audio.params.audioPtsMode == derivedFromSeq
      - rollback_open_audio.params.timebase == 48000
      - rollback_open_audio.params.sampleRate == 48000
      - rollback_open_audio.params.channels == 2
      - rollback_open_audio.params.samplesPerPacket == 1024
      - rollback_open_audio.params.firstMediaSeqId == 0
      - rollback_open_audio.params.audioPtsBase == 0
      - rollback_open_audio.params.packetizationMode == fixedSamplesPerPacket
      - rollback_open.params.syncGroupId == cast-av-rollback-19
      - rollback_open_audio.params.syncGroupId == cast-av-rollback-19
      - rollback_open.params.syncGroupId != cast-av-17
      - rollback_open.params.syncGroupId != cast-av-rollback-18
      - rollback_open_result.result.streamId == 5004
      - rollback_open_result.result.frameRate == 25
      - rollback_open_result.result.bitrateKbps == 4000
      - rollback_open_audio_result.result.streamId == 5005
      - rollback_open_audio_result.result.codec == aac
      - rollback_open_audio_result.result.transportFormat == adts
      - rollback_open_audio_result.result.streamProfile == media.audio
      - rollback_open_audio_result.result.audioPtsMode == derivedFromSeq
      - rollback_open_audio_result.result.cursorUnit == sourceCaptureTimestampUs
      - rollback_open_audio_result.result.timebase == 48000
      - rollback_open_audio_result.result.sampleRate == 48000
      - rollback_open_audio_result.result.channels == 2
      - rollback_open_audio_result.result.samplesPerPacket == 1024
      - rollback_open_audio_result.result.firstMediaSeqId == 0
      - rollback_open_audio_result.result.audioPtsBase == 0
      - rollback_open_audio_result.result.packetizationMode == fixedSamplesPerPacket
      - rollback_open_result.result.streamId != 5001
      - rollback_open_result.result.streamId != 5002
      - rollback_open_audio_result.result.streamId != 5003
      - rollback_open_audio_result.result.streamId != 5002
      - rollback_open_result.result.streamId != rollback_open_audio_result.result.streamId
      - rollback_open_result.result.syncGroupId == rollback_open_audio_result.result.syncGroupId
      - state_result.result.sourceVideo.state == rolledBack
      - state_result.result.sourceVideo.rollbackApplied == true
      - state_result.result.sourceVideo.activeStreamId == 5004
      - rolledBack requires both video and audio rollback opens to succeed

  - name: rollback_failure_leaves_stream_inactive
