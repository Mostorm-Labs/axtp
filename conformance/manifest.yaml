conformance:
  version: 0.1.0
  spec_min: spec/v0.0.2

levels:
  core:
    description: Required minimum AXTP RPC and registry behavior for all runtimes.
    required_cases:
      - rpc.request_response_json
      - rpc.method_not_found
      - rpc.request_id_match
      - rpc.invalid_params
      - error.standard_error_shape

  capability:
    description: Generated registry and capability metadata behavior available in spec/v0.0.2.
    required_cases:
      - capability.get_all
      - capability.method_binding
      - capability.unsupported_method
      - capability.registered_method_not_supported
      - capability.session_survives_not_supported
      - capability.unknown_optional_field_ignored
      - capability.known_optional_feature_not_supported
      - capability.profile_mismatch_not_supported
      - capability.video_stream_params_not_supported

  event:
    description: RPC event decode/encode behavior.
    required_cases:
      - event.subscribe_event
      - event.unsubscribe_event
      - event.emit_event
      - event.unknown_event_ignored
      - event.unsupported_capability_not_emitted

  stream:
    description: Phase 1 Standard Framed STREAM payload behavior.
    required_cases:
      - stream.stream_open
      - stream.stream_data
      - stream.stream_close
      - stream.video_stream_params_idle_open
      - stream.video_stream_params_active_reconfigure
      - stream.video_stream_params_precedence
      - stream.video_stream_params_rollback
      - stream.video_stream_params_validation

  websocket-jsonrpc:
    description: WebSocket unframed JSON RPC behavior.
    required_cases:
      - session.hello_identify_identified
      - session.axtp_version_advisory
      - session.request_before_identified
      - rpc.request_response_json
      - rpc.method_not_found
      - rpc.request_id_match

  framed-binary:
    description: Standard framed CONTROL, RPC and STREAM behavior.
    required_cases:
      - handshake.open_accept
      - handshake.close
      - handshake.heartbeat
      - rpc.request_id_match
      - stream.stream_open
      - stream.stream_data
      - stream.stream_close
