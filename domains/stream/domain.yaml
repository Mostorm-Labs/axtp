domain: stream
description: STREAM control-plane methods and events.

methods:
  - id: 0x0901
    name: stream.open
    domain: stream
    status: draft
    bit_offset: 0
    since: 1.0.0
    description: Open an AXTP STREAM media channel over HID using media.video or media.audio, without UVC or UAC.
    rpc_op: request_response
    request_schema: StreamOpenRequest
    response_schema: StreamOpenResponse
    recommended_encoding:
      - json
      - binary_tlv
    capabilities:
      - stream.hidMedia
    events:
      - stream.opened
      - stream.error
    errors:
      - SUCCESS
      - BUSY
      - RPC_PARAM_INVALID
      - MEDIA_SOURCE_NOT_FOUND
      - MEDIA_SOURCE_UNAVAILABLE
      - MEDIA_CODEC_UNSUPPORTED
      - MEDIA_RESOLUTION_UNSUPPORTED
      - MEDIA_FRAMERATE_UNSUPPORTED
      - MEDIA_STREAM_START_FAILED

events:
  - id: 0x8901
    name: stream.opened
    domain: stream
    status: draft
    bit_offset: 0
    since: 1.0.0
    description: Emitted after a STREAM media channel is opened and bound to a streamId.
    event_schema: StreamOpenedEvent
    severity: info
    trigger:
      - stream.open
    capabilities:
      - stream.hidMedia

  - id: 0x8903
    name: stream.error
    domain: stream
    status: draft
    bit_offset: 1
    since: 1.0.0
    description: Emitted when a STREAM media channel fails or cannot continue.
    event_schema: StreamErrorEvent
    severity: error
    trigger:
      - stream.open
      - stream runtime
    capabilities:
      - stream.hidMedia

types:
  StreamOpenRequest:
    kind: object
    description: Parameters for opening a HID-backed media STREAM channel.
    fields:
      - id: 0x01
        name: profile
        type: string
        required: true
        max_length: 32
        description: Stream Profile name. For this method use media.video or media.audio.
      - id: 0x02
        name: transportProfile
        type: string
        required: true
        max_length: 32
        description: Transport Profile name. HID media streams use AXTP-HID-64.
      - id: 0x03
        name: direction
        type: enum
        required: true
        description: Stream direction; values are device_to_host, host_to_device, or bidirectional.
      - id: 0x04
        name: mediaKind
        type: enum
        required: true
        description: Media kind carried by this stream; values are video or audio.
      - id: 0x05
        name: sourceId
        type: uint16
        required: false
        description: Device-local media source identifier.
      - id: 0x06
        name: codec
        type: string
        required: true
        max_length: 32
        description: Codec or sample format, for example h264, mjpeg, pcm_s16le, or opus.
      - id: 0x07
        name: width
        type: uint16
        required: false
        description: Video width in pixels. Required for video streams when not implied by sourceId.
      - id: 0x08
        name: height
        type: uint16
        required: false
        description: Video height in pixels. Required for video streams when not implied by sourceId.
      - id: 0x09
        name: frameRate
        type: uint16
        required: false
        description: Video frame rate in frames per second.
      - id: 0x0A
        name: sampleRate
        type: uint32
        required: false
        description: Audio sample rate in Hz.
      - id: 0x0B
        name: channelCount
        type: uint8
        required: false
        description: Number of audio channels.
      - id: 0x0C
        name: chunkSizeHint
        type: uint16
        required: false
        max: 42
        description: Preferred STREAM data bytes per HID-64 report after the 16B STREAM header.
      - id: 0x0D
        name: windowSizeHint
        type: uint16
        required: false
        description: Preferred stream flow-control window in chunks.

  StreamOpenResponse:
    kind: object
    description: Result of a successful STREAM media channel open.
    fields:
      - id: 0x01
        name: streamId
        type: uint32
        required: true
        description: STREAM channel identifier bound to the selected Stream Profile.
      - id: 0x02
        name: profile
        type: string
        required: true
        max_length: 32
        description: Accepted Stream Profile name.
      - id: 0x03
        name: transportProfile
        type: string
        required: true
        max_length: 32
        description: Accepted Transport Profile name.
      - id: 0x04
        name: chunkSize
        type: uint16
        required: true
        max: 42
        description: STREAM data bytes to place in each HID-64 report after the 16B STREAM header.
      - id: 0x05
        name: windowSize
        type: uint16
        required: true
        description: Negotiated stream flow-control window in chunks.
      - id: 0x06
        name: ackMode
        type: enum
        required: true
        description: Stream acknowledgement mode, such as best_effort or stop_and_wait.
      - id: 0x07
        name: cursorUnit
        type: enum
        required: true
        description: Cursor unit used in the 64-bit STREAM cursor, usually timestampUs for media streams.

  StreamOpenedEvent:
    kind: object
    description: Payload emitted when a STREAM media channel is opened.
    fields:
      - id: 0x01
        name: streamId
        type: uint32
        required: true
        description: Opened STREAM channel identifier.
      - id: 0x02
        name: profile
        type: string
        required: true
        max_length: 32
        description: Bound Stream Profile name.
      - id: 0x03
        name: transportProfile
        type: string
        required: true
        max_length: 32
        description: Bound Transport Profile name.
      - id: 0x04
        name: mediaKind
        type: enum
        required: true
        description: Media kind carried by the stream; values are video or audio.

  StreamErrorEvent:
    kind: object
    description: Payload emitted when a STREAM media channel fails.
    fields:
      - id: 0x01
        name: streamId
        type: uint32
        required: false
        description: STREAM channel identifier, absent if the failure happened before allocation.
      - id: 0x02
        name: errorCode
        type: uint16
        required: true
        description: AXTP ErrorCode value describing the stream failure.
      - id: 0x03
        name: message
        type: string
        required: false
        max_length: 128
        description: Optional diagnostic text.

  StreamHidMediaCapability:
    kind: object
    description: Describes HID-backed media STREAM support.
    fields:
      - id: 0x01
        name: transportProfile
        type: string
        required: true
        max_length: 32
        description: Supported HID Transport Profile, usually AXTP-HID-64.
      - id: 0x02
        name: maxStreamCount
        type: uint8
        required: true
        description: Maximum simultaneously opened media streams.
      - id: 0x03
        name: maxChunkSize
        type: uint16
        required: true
        max: 42
        description: Maximum STREAM data bytes per HID-64 report after the 16B STREAM header.
      - id: 0x04
        name: supportsVideo
        type: bool
        required: true
        description: Device can open media.video streams over HID.
      - id: 0x05
        name: supportsAudio
        type: bool
        required: true
        description: Device can open media.audio streams over HID.

errors:
  - id: 0x0801
    name: MEDIA_SOURCE_NOT_FOUND
    domain: media
    status: draft
    description: Requested media source does not exist.
    retryable: false
  - id: 0x0802
    name: MEDIA_SOURCE_UNAVAILABLE
    domain: media
    status: draft
    description: Requested media source is currently unavailable.
    retryable: true
  - id: 0x0803
    name: MEDIA_CODEC_UNSUPPORTED
    domain: media
    status: draft
    description: Requested media codec or sample format is unsupported.
    retryable: false
  - id: 0x0804
    name: MEDIA_RESOLUTION_UNSUPPORTED
    domain: media
    status: draft
    description: Requested video resolution is unsupported.
    retryable: false
  - id: 0x0805
    name: MEDIA_FRAMERATE_UNSUPPORTED
    domain: media
    status: draft
    description: Requested video frame rate is unsupported.
    retryable: false
  - id: 0x0807
    name: MEDIA_STREAM_START_FAILED
    domain: media
    status: draft
    description: Device failed to start the requested media stream.
    retryable: true

capabilities:
  - id: 0x0908
    name: stream.hidMedia
    domain: stream
    status: draft
    type: object
    schema: StreamHidMediaCapability
    description: Device supports opening media.video and/or media.audio streams over AXTP-HID-64.

profiles:
  - name: AXTP-HID-MEDIA
    since: 1.0.0
    status: draft
    extends: AXTP-MVP-HID
    requiredMethods:
      - stream.open
    requiredEvents:
      - stream.opened
      - stream.error
    requiredErrors:
      - SUCCESS
      - BUSY
      - RPC_PARAM_INVALID
      - MEDIA_SOURCE_NOT_FOUND
      - MEDIA_SOURCE_UNAVAILABLE
      - MEDIA_CODEC_UNSUPPORTED
      - MEDIA_STREAM_START_FAILED
    requiredTypes:
      - StreamOpenRequest
      - StreamOpenResponse
      - StreamOpenedEvent
      - StreamErrorEvent
      - StreamHidMediaCapability
    transportProfiles:
      - AXTP-HID-64
    frameProfile: COMPACT_FRAME
