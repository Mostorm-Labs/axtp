schemas:
  CapabilitySupportedMethodsRequest:
    type: object
    fields: []

  CapabilitySupportedMethodsResponse:
    type: object
    fields:
      - id: 0x01
        name: methodMaskCount
        type: uint16
        required: true
        deprecated: false
      - id: 0x02
        name: methodMasks
        type: bytes
        required: true
        derived_from: "methods[].bitOffset"
        deprecated: false

  FirmwareOtaCapability:
    type: object
    fields:
      - id: 0x01
        name: maxImageSize
        type: uint32
        required: true
        deprecated: false
      - id: 0x02
        name: maxChunkSize
        type: uint16
        required: true
        deprecated: false
