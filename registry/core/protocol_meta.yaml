protocol:
  name: AXTP
  version: 1.0.0
  specVersion: 1
  registryVersion: 1.0.0
  status: rc1

wire:
  byteOrder: big-endian
  byteOrderAlias: network
  integerEncoding: unsigned and signed multi-byte integers use Big-Endian / network byte order
  crcByteOrder: big-endian
  scope: Standard Framed Binary, CONTROL, RPC JSON_BINARY, TLV, STREAM header, and CRC footer

overview:
  title: AXTP Protocol
  summary: >
    AXTP is a transport-independent device communication protocol for
    CONTROL, RPC and STREAM payloads across Standard Framed transports, plus
    a formal WebSocket Unframed JSON RPC profile. Phase 1 requires the STREAM
    data plane for audio/video media flow profiles.
  goals:
    - Provide one unified protocol model for control, request/response RPC and audio/video stream transfer.
    - Make Standard Frame the AXTP v1 Core binary path for USB HID High Speed and TCP.
    - Support WebSocket Unframed JSON as the formal RPC-only integration path.
    - Keep full dynamic capability modeling optional outside AXTP v1 Core.
  nonGoals:
    - Full dynamic UI capability modeling is not required in v1.
    - Compact/HID-64/BLE/UART low-bandwidth framing is not required by AXTP v1 Core.
    - STREAM is not carried over WebSocket Unframed JSON.
    - Header profile negotiation is not performed dynamically in v1.

architecture:
  layers:
    - name: Transport Profile
      description: Defines how AXTP runs over USB HID High Speed, TCP, or WebSocket JSON.
    - name: Frame Profile
      description: Standard Frame is the v1 Core binary frame profile; unframed JSON skips the Frame layer.
    - name: Payload Layer
      description: Carries CONTROL, RPC or STREAM payloads.
    - name: RPC Session
      description: Handles Hello, Identify, requests, responses, events and errors.
    - name: Stream Session
      description: Handles Phase 1 audio/video stream transfer and later OTA, file, log and sensor chunk transfer profiles.
  lifecycle:
    - step: OPEN
      from: Client
      to: Server
      description: Open an AXTP logical session and declare runtime limits.
    - step: ACCEPT
      from: Server
      to: Client
      description: Accept the session and return final runtime parameters.
    - step: Hello
      from: Server
      to: Client
      description: Announce RPC session rules, AXTP version and authentication requirements.
    - step: Identify
      from: Client
      to: Server
      description: Submit client identity, randomSeed uint32 and optional authentication data.
    - step: Identified
      from: Server
      to: Client
      description: Confirm that the RPC session is ready.
    - step: Load Adopted Registry
      from: Client
      to: Server
      description: Use the generated protocol registry to select adopted business methods for the current product.
  optionalLifecycleExtensions:
    - step: READY
      status: optional
      description: Reserved for transports that need an explicit client acknowledgement after ACCEPT; not required by AXTP v1 Core.

guide:
  quickStart:
    - title: Minimal Client Startup
      steps:
        - Connect using AXTP-USB-HID, AXTP-TCP, or AXTP-WS-JSON.
        - For Standard Framed transports, send CONTROL OPEN and wait for CONTROL ACCEPT.
        - For WebSocket Unframed JSON, skip CONTROL and wait for Hello after the WebSocket opens.
        - Wait for Hello.
        - Send Identify if required.
        - Load generated protocol registry for the current product build.
        - Start RPC requests.
    - title: WebSocket Unframed JSON Startup
      steps:
        - Open the WebSocket connection.
        - Wait for Hello from the Logical Server.
        - Send Identify using the JSON sid/op/d envelope.
        - Wait for Identified.
        - Load generated protocol registry for the current product build.
        - Start JSON RPC requests and receive JSON events.
    - title: Cloud Reverse Connection
      steps:
        - Device opens the WebSocket connection to the cloud endpoint.
        - No CONTROL OPEN or Standard Frame is used in this profile.
        - Device remains the Logical Server and sends Hello after the WebSocket is established.
        - Cloud identifies as the Logical Client and then issues JSON RPC requests.

frameProfiles:
  - name: STANDARD_FRAME
    magic: AX
    l1: STANDARD_L1
    l2: STANDARD_L2
    supportsMixing: false

transports:
  - name: AXTP-USB-HID
    family: usb-hid
    mode: standard-framed
    frameProfile: STANDARD_FRAME
    production: true
    rpcEncodings: [JSON, CBOR, MSGPACK, JSON_BINARY]
    supportsControl: true
    supportsStream: true
    physicalClient: Host / App
    physicalServer: USB HID Device
    logicalClient: Host / App
    logicalServer: Device
    helloSender: Device
    notes: USB HID High Speed or large-report HID transport using Standard Frame.
  - name: AXTP-TCP
    family: tcp
    mode: standard-framed
    frameProfile: STANDARD_FRAME
    production: true
    rpcEncodings: [JSON, CBOR, MSGPACK, JSON_BINARY]
    supportsControl: true
    supportsStream: true
    physicalClient: App / PC
    physicalServer: Device
    logicalClient: App / PC
    logicalServer: Device
    helloSender: Device
    notes: TCP byte stream transport using Standard Frame magic and length parsing.
  - name: AXTP-WS-JSON
    family: websocket
    mode: unframed-json
    frameProfile: none
    production: true
    rpcEncodings: [JSON]
    supportsControl: false
    supportsStream: false
    physicalClient: App / Cloud
    physicalServer: Device / Gateway
    logicalClient: App / Cloud
    logicalServer: Device
    helloSender: Device
    notes: Formal RPC-only WebSocket JSON profile using the sid/op/d envelope.
  - name: AXTP-WS-CLOUD-REVERSE
    family: websocket
    mode: unframed-json-cloud-reverse
    frameProfile: none
    production: true
    rpcEncodings: [JSON]
    supportsControl: false
    supportsStream: false
    physicalClient: Device
    physicalServer: Cloud
    logicalClient: Cloud
    logicalServer: Device
    helloSender: Device
    notes: Device initiates the WebSocket connection but remains the Logical Server.

payloadTypes:
  - name: CONTROL
    id: 0x01
    headerBytes: 5
    description: Logical session control payload.
  - name: RPC
    id: 0x02
    headerBytes: 1
    description: RPC payload starts with rpcEncoding; JSON_BINARY then carries the fixed binary envelope.
  - name: STREAM
    id: 0x03
    headerBytes: 16
    description: Chunk-oriented data plane payload.

control:
  requiredOpcodes: [OPEN, ACCEPT, HEARTBEAT, HEARTBEAT_ACK, CLOSE, CLOSE_ACK]
  optionalOpcodes: [READY, ACK, NACK]
  reservedOpcodes: []
  rules:
    - Standard Framed transports require OPEN and ACCEPT before RPC or STREAM payloads.
    - Phase 1 runtimes must implement HEARTBEAT/HEARTBEAT_ACK and CLOSE/CLOSE_ACK for framed links.
    - WebSocket Unframed JSON does not use CONTROL payloads.
    - READY is not required by v1 Core and must not be assumed by peers.
    - ACK/NACK opcodes and fields are reserved for future reliable-transfer profiles and are not Phase 1 requirements.
    - Dynamic header negotiation is not performed in v1.

stream:
  header:
    name: AxtpStreamHeader
    size: 16
    fields:
      - { name: streamId, type: uint32 }
      - { name: seqId, type: uint32 }
      - { name: cursor, type: uint64 }
  rules:
    - STREAM uses the unified 16-byte header in Standard Framed transports.
    - WebSocket Unframed JSON must not carry STREAM data.
    - The historical 8-byte stream header is not part of AXTP v1 Core.
    - Phase 1 Standard Framed runtimes must implement STREAM data packets for adopted audio/video media stream profiles.

compatibility:
  legacySources:
    - docs/legacy-migration/planning/AXTP-Legacy-Compatibility-Reference.md
    - docs/legacy-migration/planning/AXTP-Legacy-Registry-Migration-Map.md
  rules:
    - Stable methodId, eventId and error code values must not be reused.
    - Legacy command mappings may be preserved as metadata under methods[].legacy.
    - Low-bandwidth Compact transports are documented as a degradation path outside AXTP v1 Core.
