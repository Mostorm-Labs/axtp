methods:
  - id: 0x0101
    name: device.getInfo
    description: Return static device identity and firmware metadata.
    domain: device
    status: mvp
    bitOffset: 0
    rpcOp: request_response
    requestSchema: DeviceGetInfoRequest
    responseSchema: DeviceGetInfoResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [device.info]
    events: []
    errors: [SUCCESS, RPC_METHOD_NOT_FOUND, RPC_PARAM_INVALID]
    legacy:
      cmdValue: 0x000B0002
      name: BetaDeviceInfo
      payloadFormat: fixed_struct

  - id: 0x0301
    name: capability.supportedMethods
    description: Return the per-domain method bitmap supported by the current session.
    domain: capability
    status: mvp
    bitOffset: 0
    rpcOp: request_response
    requestSchema: CapabilitySupportedMethodsRequest
    responseSchema: CapabilitySupportedMethodsResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [capability.supportedMethods]
    events: []
    errors: [SUCCESS, RPC_METHOD_NOT_FOUND]

  - id: 0x0501
    name: display.getBrightness
    description: Read the current display brightness percentage.
    domain: display
    status: mvp
    bitOffset: 0
    rpcOp: request_response
    requestSchema: DisplayGetBrightnessRequest
    responseSchema: DisplayGetBrightnessResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [display.brightness]
    events: []
    errors: [SUCCESS, RPC_METHOD_NOT_FOUND]

  - id: 0x0502
    name: display.setBrightness
    description: Set the display brightness and optionally request a transition duration.
    domain: display
    status: mvp
    bitOffset: 1
    rpcOp: request_response
    requestSchema: DisplaySetBrightnessRequest
    responseSchema: CommonEmptyResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [display.brightness]
    events: [display.brightnessChanged]
    errors: [SUCCESS, RPC_PARAM_INVALID, BUSY]
    legacy:
      cmdValue: 0x000B0042
      name: BetaBrightnessSet
      payloadFormat: fixed_struct

  - id: 0x0B02
    name: firmware.begin
    description: Begin a firmware OTA transfer and allocate the STREAM context.
    domain: firmware
    status: mvp
    bitOffset: 0
    rpcOp: request_response
    requestSchema: FirmwareBeginRequest
    responseSchema: FirmwareBeginResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [firmware.ota]
    events: [firmware.updateProgress]
    errors: [SUCCESS, RPC_PARAM_INVALID, BUSY]

  - id: 0x0B03
    name: firmware.end
    description: Finish sending firmware data for the active OTA stream.
    domain: firmware
    status: mvp
    bitOffset: 1
    rpcOp: request_response
    requestSchema: FirmwareEndRequest
    responseSchema: FirmwareEndResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [firmware.ota]
    events: []
    errors: [SUCCESS, STREAM_NOT_FOUND, BUSY]

  - id: 0x0B04
    name: firmware.verify
    description: Verify the transferred firmware object before applying it.
    domain: firmware
    status: mvp
    bitOffset: 2
    rpcOp: request_response
    requestSchema: FirmwareVerifyRequest
    responseSchema: FirmwareVerifyResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [firmware.ota]
    events: [firmware.updateCompleted, firmware.updateFailed]
    errors: [SUCCESS, STREAM_CRC_ERROR, BUSY]

  - id: 0x0B05
    name: firmware.apply
    description: Apply a verified firmware image.
    domain: firmware
    status: mvp
    bitOffset: 3
    rpcOp: request_response
    requestSchema: FirmwareApplyRequest
    responseSchema: FirmwareApplyResponse
    recommendedEncoding: [json, binary_tlv]
    capabilities: [firmware.ota]
    events: [firmware.updateCompleted, firmware.updateFailed]
    errors: [SUCCESS, BUSY]
