generator:
  name: axtp-generator
  version: 1.0.0

input:
  registry_dir: contract/registry
  schema_dir: contract/registry/schema

output:
  markdown_dir: contract/generated
  protocol_dir: contract/protocol
  json_dir: contract/mcp
  test_vector_dir: contract/test-vectors

cpp:
  namespace: axtp
  standard: c++17
  enum_class: true
  generate_structs: true
  generate_descriptors: true
  generate_tlv_helpers: true

validation:
  level: strict
  fail_on_duplicate_id: true
  fail_on_unknown_schema: true
  fail_on_missing_mvp_item: true
  allow_experimental: false

compatibility:
  legacy: true
