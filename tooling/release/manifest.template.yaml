axtp_spec:
  version: "{{VERSION}}"
  tag: "spec/v{{VERSION}}"
  commit: "{{COMMIT}}"
  released_at: "{{DATE}}"

contents:
  contract_paths:
    - README.md
    - LICENSE
    - docs/README.md
    - docs/guides/
    - docs/product/
    - contract/protocol/axtp.protocol.yaml
    - contract/generated/protocol.md
    - contract/generated/protocol.json
    - contract/registry/
    - specs/
    - conformance/
    - contract/mcp/
    - contract/test-vectors/
  compatibility_paths: []
  supplemental_paths:
    - CHANGELOG.md
    - release/
  excluded_paths:
    - workspace/
    - tooling/skills/
    - tooling/release/
    - docs/release/
    - docs/architecture/
    - docs/conformance/
    - docs/workspace/
    - "**/.DS_Store"
  excluded_legacy_specs_dirs:
    - 0-principles
    - 1-core
    - 2-registry
    - 3-codec
    - 4-tooling

runtime_update:
  target_runtime_version: "{{VERSION}}.0"
  dispatch_event: "axtp_spec_released"

notes:
  summary: ""
  breaking_changes: []
  runtime_required_changes: []
