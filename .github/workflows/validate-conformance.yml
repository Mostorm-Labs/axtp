name: Validate AXTP Spec

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AXTP spec
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install generator dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir tooling/generators install --frozen-lockfile

      - name: Validate generator and generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir tooling/generators build
          pnpm --dir tooling/generators lint
          pnpm --dir tooling/generators test
          pnpm --dir tooling/generators validate
          pnpm --dir tooling/generators validate:sources
          pnpm --dir tooling/generators validate:protocol
          tooling/scripts/check-generated-drift.sh

      - name: Validate conformance cases
        shell: bash
        run: tooling/scripts/validate-conformance.sh

      - name: Validate docs and protocol status
        shell: bash
        run: |
          set -euo pipefail
          tooling/scripts/check-links.mjs
          node tooling/scripts/check-text-paths.mjs
          node tooling/scripts/check-draft-noise.mjs
          tooling/scripts/check-protocol-status.mjs
          node tooling/scripts/report-protocol-draft-health.mjs --check docs/product/protocol-draft-health.md

      - name: Validate release artifact dry run
        shell: bash
        run: tooling/scripts/check-release-artifact.sh 0.0.0
