name: Validate AXTP Spec

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-spec:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AXTP spec
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Install generator dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir generators install --frozen-lockfile

      - name: Validate generator and generated artifacts
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir generators build
          pnpm --dir generators lint
          pnpm --dir generators test
          pnpm --dir generators validate
          pnpm --dir generators validate:sources
          pnpm --dir generators validate:protocol
          scripts/check-generated-drift.sh

      - name: Validate conformance cases
        shell: bash
        run: scripts/validate-conformance.sh

      - name: Validate docs and protocol status
        shell: bash
        run: |
          set -euo pipefail
          scripts/check-links.mjs
          scripts/check-protocol-status.mjs

      - name: Validate release artifact dry run
        shell: bash
        run: scripts/check-release-artifact.sh 0.0.0
