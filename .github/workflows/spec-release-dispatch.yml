name: Release AXTP Spec and Dispatch Runtime Upgrades

on:
  push:
    tags:
      - "spec/v*"

permissions:
  contents: write

jobs:
  release-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AXTP spec
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse spec tag
        shell: bash
        run: |
          set -euo pipefail

          spec_tag="$GITHUB_REF_NAME"
          if [[ ! "$spec_tag" =~ ^spec/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "AXTP Spec release tags must match spec/vMAJOR.MINOR.PATCH" >&2
            exit 2
          fi

          spec_version="${spec_tag#spec/v}"
          spec_commit="$(git rev-parse "$GITHUB_SHA^{commit}")"

          echo "SPEC_TAG=$spec_tag" >> "$GITHUB_ENV"
          echo "SPEC_VERSION=$spec_version" >> "$GITHUB_ENV"
          echo "SPEC_COMMIT=$spec_commit" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Validate release inputs
        shell: bash
        run: |
          set -euo pipefail
          pnpm --dir tooling/generators install --frozen-lockfile
          pnpm --dir tooling/generators build
          pnpm --dir tooling/generators lint
          pnpm --dir tooling/generators test
          pnpm --dir tooling/generators validate
          pnpm --dir tooling/generators validate:sources
          pnpm --dir tooling/generators validate:protocol
          tooling/scripts/check-generated-drift.sh
          tooling/scripts/validate-conformance.sh
          tooling/scripts/check-links.mjs
          node tooling/scripts/check-text-paths.mjs
          tooling/scripts/check-protocol-status.mjs

      - name: Build spec artifact
        shell: bash
        run: tooling/scripts/build-spec-artifact.sh "$SPEC_VERSION"

      - name: Create or update AXTP Spec release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.SPEC_TAG }}
          name: AXTP Spec v${{ env.SPEC_VERSION }}
          files: dist/axtp-spec-v${{ env.SPEC_VERSION }}.zip
          make_latest: true

      - name: Dispatch runtime/tool upgrades
        shell: bash
        env:
          AXTP_RUNTIME_DISPATCH_TOKEN: ${{ secrets.AXTP_RUNTIME_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${AXTP_RUNTIME_DISPATCH_TOKEN:-}" ]]; then
            echo "Missing required secret AXTP_RUNTIME_DISPATCH_TOKEN." >&2
            echo "Configure this PAT in the axtp repository so it can send repository_dispatch events to runtime/tool repositories." >&2
            exit 1
          fi

          spec_repository="https://github.com/Mostorm-Labs/axtp"
          repositories=(
            "Mostorm-Labs/axtp-c-runtime"
            "Mostorm-Labs/axtp-cpp-runtime"
            "Mostorm-Labs/axtp-flutter-runtime"
            "Mostorm-Labs/axtp-python-runtime"
            "Mostorm-Labs/axtp-ts-runtime"
            "Mostorm-Labs/axtp-mock-server"
          )

          payload="$(jq -n \
            --arg spec_tag "$SPEC_TAG" \
            --arg spec_version "$SPEC_VERSION" \
            --arg spec_repository "$spec_repository" \
            --arg spec_commit "$SPEC_COMMIT" \
            '{event_type: "axtp_spec_released", client_payload: {spec_tag: $spec_tag, spec_version: $spec_version, spec_repository: $spec_repository, spec_commit: $spec_commit}}')"

          for repository in "${repositories[@]}"; do
            echo "Dispatching axtp_spec_released to $repository"
            curl -fsS \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $AXTP_RUNTIME_DISPATCH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$repository/dispatches" \
              -d "$payload"
          done
