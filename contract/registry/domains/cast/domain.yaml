domain: cast
description: Cast receiver control capabilities for AirPlay/UxPlay and receiver-side status.

methods:
  - id: 0x1601
    name: cast.getSession
    domain: cast
    status: draft
    bitOffset: 0
    since: 1.0.0
    description: Return the current cast receiver phase and active session summary.
    rpc_op: request_response
    request_schema: CastGetSessionParams
    response_schema: CastSessionState
    recommended_encoding: [json, tlv]
    capabilities: [cast.session]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1602
    name: cast.stopSession
    domain: cast
    status: draft
    bitOffset: 1
    since: 1.0.0
    description: Stop the current cast session when one is active.
    rpc_op: request_response
    request_schema: CastStopSessionParams
    response_schema: CastStopSessionResult
    recommended_encoding: [json, tlv]
    capabilities: [cast.session]
    events: [cast.sessionStateChanged, cast.sessionStopped]
    errors: [SUCCESS, INVALID_ARGUMENT, INVALID_STATE, UNAVAILABLE]

  - id: 0x1603
    name: cast.getAirPlayName
    domain: cast
    status: draft
    bitOffset: 2
    since: 1.0.0
    description: Return the AirPlay receiver display name and publish state.
    rpc_op: request_response
    request_schema: Empty
    response_schema: CastAirPlayNameState
    recommended_encoding: [json, tlv]
    capabilities: [cast.session]
    errors: [SUCCESS, UNAVAILABLE]

  - id: 0x1604
    name: cast.setAirPlayName
    domain: cast
    status: draft
    bitOffset: 3
    since: 1.0.0
    description: Set the AirPlay receiver display name and request service rediscovery.
    rpc_op: request_response
    request_schema: CastSetAirPlayNameParams
    response_schema: CastAirPlayNameState
    recommended_encoding: [json, tlv]
    capabilities: [cast.session]
    events: [cast.sessionStateChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1605
    name: cast.getAudio
    domain: cast
    status: draft
    bitOffset: 4
    since: 1.0.0
    description: Return local cast audio playback and mute state.
    rpc_op: request_response
    request_schema: CastGetAudioParams
    response_schema: CastAudioState
    recommended_encoding: [json, tlv]
    capabilities: [cast.audio]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1606
    name: cast.setAudio
    domain: cast
    status: draft
    bitOffset: 5
    since: 1.0.0
    description: Enable or disable local playback of received cast audio.
    rpc_op: request_response
    request_schema: CastSetAudioParams
    response_schema: CastAudioState
    recommended_encoding: [json, tlv]
    capabilities: [cast.audio]
    events: [cast.audioChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1607
    name: cast.setMuted
    domain: cast
    status: draft
    bitOffset: 6
    since: 1.0.0
    description: Mute or unmute local cast audio output.
    rpc_op: request_response
    request_schema: CastSetMutedParams
    response_schema: CastAudioState
    recommended_encoding: [json, tlv]
    capabilities: [cast.audio]
    events: [cast.audioChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1608
    name: cast.getPinCodeConfig
    domain: cast
    status: draft
    bitOffset: 7
    since: 1.0.0
    description: Return cast PIN protection state, visibility, and optional secret material.
    rpc_op: request_response
    request_schema: CastGetPinCodeConfigParams
    response_schema: CastPinCodeConfig
    recommended_encoding: [json, tlv]
    capabilities: [cast.pinCode]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1609
    name: cast.setPinCodeConfig
    domain: cast
    status: draft
    bitOffset: 8
    since: 1.0.0
    description: Enable or disable cast PIN protection and update display policy.
    rpc_op: request_response
    request_schema: CastSetPinCodeConfigParams
    response_schema: CastPinCodeConfig
    recommended_encoding: [json, tlv]
    capabilities: [cast.pinCode]
    events: [cast.pinCodeChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, INVALID_STATE, UNAVAILABLE]

  - id: 0x160A
    name: cast.setPinCode
    domain: cast
    status: draft
    bitOffset: 9
    since: 1.0.0
    description: Set the current cast PIN value according to receiver policy.
    rpc_op: request_response
    request_schema: CastSetPinCodeParams
    response_schema: CastPinCodeConfig
    recommended_encoding: [json, tlv]
    capabilities: [cast.pinCode]
    events: [cast.pinCodeChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, INVALID_STATE, UNAVAILABLE]

  - id: 0x160B
    name: cast.getWindowState
    domain: cast
    status: draft
    bitOffset: 10
    since: 1.0.0
    description: Return cast window visibility, mode, and bounds summary.
    rpc_op: request_response
    request_schema: Empty
    response_schema: CastWindowState
    recommended_encoding: [json, tlv]
    capabilities: [cast.window]
    errors: [SUCCESS, UNAVAILABLE]

  - id: 0x160C
    name: cast.setWindowState
    domain: cast
    status: draft
    bitOffset: 11
    since: 1.0.0
    description: Set cast window mode, fullscreen state, or always-on-top state.
    rpc_op: request_response
    request_schema: CastSetWindowStateParams
    response_schema: CastWindowState
    recommended_encoding: [json, tlv]
    capabilities: [cast.window]
    events: [cast.windowChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, INVALID_STATE, UNAVAILABLE]

  - id: 0x160D
    name: cast.getBackendStatus
    domain: cast
    status: draft
    bitOffset: 12
    since: 1.0.0
    description: Return cast backend process, discoverability, and last-error state.
    rpc_op: request_response
    request_schema: CastGetBackendStatusParams
    response_schema: CastBackendStatus
    recommended_encoding: [json, tlv]
    capabilities: [cast.backend]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x160E
    name: cast.restartBackend
    domain: cast
    status: draft
    bitOffset: 13
    since: 1.0.0
    description: Restart the cast backend without restarting the receiver application or device.
    rpc_op: request_response
    request_schema: CastRestartBackendParams
    response_schema: CastRestartBackendResult
    recommended_encoding: [json, tlv]
    capabilities: [cast.backend]
    events: [cast.backendChanged, cast.sessionStopped]
    errors: [SUCCESS, BUSY, INVALID_STATE, UNAVAILABLE]

  - id: 0x160F
    name: cast.getFlowControlState
    domain: cast
    status: draft
    bitOffset: 14
    since: 1.0.0
    description: Return local cast render fps, queue policy, and low-frequency diagnostics.
    rpc_op: request_response
    request_schema: CastGetFlowControlStateParams
    response_schema: CastFlowControlState
    recommended_encoding: [json, tlv]
    capabilities: [cast.flowControl]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

  - id: 0x1610
    name: cast.setRenderFps
    domain: cast
    status: draft
    bitOffset: 15
    since: 1.0.0
    description: Set the receiver-local target render fps for cast media.
    rpc_op: request_response
    request_schema: CastSetRenderFpsParams
    response_schema: CastFlowControlState
    recommended_encoding: [json, tlv]
    capabilities: [cast.flowControl]
    events: [cast.flowControlChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, OUT_OF_RANGE, UNAVAILABLE]

  - id: 0x1611
    name: cast.setFlowPolicy
    domain: cast
    status: draft
    bitOffset: 16
    since: 1.0.0
    description: Set receiver-local cast queue, late-frame, drop, and overlay policy.
    rpc_op: request_response
    request_schema: CastSetFlowPolicyParams
    response_schema: CastFlowControlState
    recommended_encoding: [json, tlv]
    capabilities: [cast.flowControl]
    events: [cast.flowControlChanged]
    errors: [SUCCESS, INVALID_ARGUMENT, OUT_OF_RANGE, UNAVAILABLE]

  - id: 0x1612
    name: cast.getStatus
    domain: cast
    status: draft
    bitOffset: 17
    since: 1.0.0
    description: Return a current cast receiver snapshot for UI reload, reconnect, or event-loss recovery.
    rpc_op: request_response
    request_schema: CastGetStatusParams
    response_schema: CastStatus
    recommended_encoding: [json, tlv]
    capabilities: [cast.status]
    errors: [SUCCESS, INVALID_ARGUMENT, UNAVAILABLE]

events:
  - id: 0x1601
    name: cast.sessionIncoming
    domain: cast
    status: draft
    bitOffset: 0
    since: 1.0.0
    description: Emitted when a cast source initiates a receiver session.
    event_schema: CastSessionIncomingEvent
    severity: info
    trigger: [source connected, backend incoming session]
    capabilities: [cast.session]

  - id: 0x1602
    name: cast.sessionStateChanged
    domain: cast
    status: draft
    bitOffset: 1
    since: 1.0.0
    description: Emitted when receiver phase, protocol state, or low-frequency session media state changes.
    event_schema: CastSessionStateChangedEvent
    severity: info
    trigger: [incoming session, authentication, stream starting, media flow started, interruption, stopping]
    capabilities: [cast.session]

  - id: 0x1603
    name: cast.sessionStarted
    domain: cast
    status: draft
    bitOffset: 2
    since: 1.0.0
    description: Emitted when a cast session becomes user-visible after first frame or local playback starts.
    event_schema: CastSessionStartedEvent
    severity: info
    trigger: [first frame rendered, local playback started]
    capabilities: [cast.session]

  - id: 0x1604
    name: cast.sessionStopped
    domain: cast
    status: draft
    bitOffset: 3
    since: 1.0.0
    description: Emitted when a cast session ends normally or is forced to stop.
    event_schema: CastSessionStoppedEvent
    severity: info
    trigger: [cast.stopSession, source closed, backend restart, backend exited]
    capabilities: [cast.session]

  - id: 0x1605
    name: cast.sessionFailed
    domain: cast
    status: draft
    bitOffset: 4
    since: 1.0.0
    description: Emitted when cast connection, authentication, negotiation, or backend handling fails.
    event_schema: CastSessionFailedEvent
    severity: error
    trigger: [connection failed, authentication failed, media negotiation failed, backend failed]
    capabilities: [cast.session]

  - id: 0x1606
    name: cast.audioChanged
    domain: cast
    status: draft
    bitOffset: 5
    since: 1.0.0
    description: Emitted when local cast audio playback or mute state changes.
    event_schema: CastAudioChangedEvent
    severity: info
    trigger: [cast.setAudio, cast.setMuted, local UI, session started, session stopped]
    capabilities: [cast.audio]

  - id: 0x1607
    name: cast.pinCodeChanged
    domain: cast
    status: draft
    bitOffset: 6
    since: 1.0.0
    description: Emitted when cast PIN protection configuration or current PIN state changes.
    event_schema: CastPinCodeChangedEvent
    severity: info
    trigger: [cast.setPinCodeConfig, cast.setPinCode, generated PIN changed]
    capabilities: [cast.pinCode]

  - id: 0x1608
    name: cast.pinCodeRequired
    domain: cast
    status: draft
    bitOffset: 7
    since: 1.0.0
    description: Emitted when a cast source is waiting for PIN authentication.
    event_schema: CastPinCodeRequiredEvent
    severity: info
    trigger: [incoming session requires PIN]
    capabilities: [cast.pinCode]

  - id: 0x1609
    name: cast.pinCodeAuthFailed
    domain: cast
    status: draft
    bitOffset: 8
    since: 1.0.0
    description: Emitted when PIN authentication fails, times out, or is cancelled.
    event_schema: CastPinCodeAuthFailedEvent
    severity: warning
    trigger: [wrong PIN, authentication timeout, authentication cancelled, too many attempts]
    capabilities: [cast.pinCode]

  - id: 0x160A
    name: cast.windowChanged
    domain: cast
    status: draft
    bitOffset: 9
    since: 1.0.0
    description: Emitted when cast window visibility, mode, topmost state, or bounds changes.
    event_schema: CastWindowChangedEvent
    severity: info
    trigger: [cast.setWindowState, local UI, session started, session stopped]
    capabilities: [cast.window]

  - id: 0x160B
    name: cast.backendChanged
    domain: cast
    status: draft
    bitOffset: 10
    since: 1.0.0
    description: Emitted when cast backend ready, restart, exit, failed, or discoverable state changes.
    event_schema: CastBackendChangedEvent
    severity: info
    trigger: [backend started, backend restarting, backend exited, backend failed, discovery changed]
    capabilities: [cast.backend]

  - id: 0x160C
    name: cast.flowControlChanged
    domain: cast
    status: draft
    bitOffset: 11
    since: 1.0.0
    description: Emitted when receiver-local cast flow policy or low-frequency flow statistics change.
    event_schema: CastFlowControlChangedEvent
    severity: info
    trigger: [cast.setRenderFps, cast.setFlowPolicy, diagnostics sample]
    capabilities: [cast.flowControl]

types:
  CastSourceSummary:
    kind: object
    description: Summary of a cast source device or local AXTP sender.
    fields:
      - id: 0x01
        name: name
        type: string
        required: false
        max_length: 128
        description: User-visible source name when known.
      - id: 0x02
        name: model
        type: string
        required: false
        max_length: 128
        description: Source model identifier when known.
      - id: 0x03
        name: address
        type: string
        required: false
        max_length: 128
        description: Network or transport address summary when safe to expose.
      - id: 0x04
        name: sourceId
        type: string
        required: false
        max_length: 128
        description: Receiver-local source identifier.
      - id: 0x05
        name: protocol
        type: enum
        required: false
        enum: [airplay, hid, unknown]
        description: Protocol path that produced the source summary.

  CastMediaSummary:
    kind: object
    description: Low-frequency media summary for a cast session.
    fields:
      - id: 0x01
        name: firstFrame
        type: bool
        required: false
        description: Whether the first visible frame has rendered.
      - id: 0x02
        name: width
        type: uint32
        required: false
        description: Current media width in pixels.
      - id: 0x03
        name: height
        type: uint32
        required: false
        description: Current media height in pixels.
      - id: 0x04
        name: orientation
        type: enum
        required: false
        enum: [landscape, portrait, unknown]
        description: Current media orientation summary.
      - id: 0x05
        name: inputFps
        type: number
        required: false
        min: 0
        description: Estimated incoming media frame rate.
      - id: 0x06
        name: renderFps
        type: number
        required: false
        min: 0
        description: Estimated local render frame rate.
      - id: 0x07
        name: audioActive
        type: bool
        required: false
        description: Whether local receiver audio output is active.

  CastLastError:
    kind: object
    description: Redactable backend or receiver error summary.
    fields:
      - id: 0x01
        name: code
        type: string
        required: false
        max_length: 64
        description: Backend-local or AXTP-visible error code.
      - id: 0x02
        name: message
        type: string
        required: false
        max_length: 512
        description: Human-readable error summary suitable for authorized clients.
      - id: 0x03
        name: occurredAt
        type: string
        required: false
        max_length: 64
        description: Timestamp when the error was observed.
      - id: 0x04
        name: redacted
        type: bool
        required: false
        default: false
        description: Whether sensitive details were removed from this summary.

  CastGetSessionParams:
    kind: object
    description: Selector for cast receiver and active session summary.
    fields:
      - id: 0x01
        name: include
        type: array
        array:
          item_type: string
        required: false
        description: Optional summary sections, such as source, media, or airPlayName.
      - id: 0x02
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Optional receiver-local session id to query.

  CastSessionState:
    kind: object
    description: Current receiver phase and active session state.
    fields:
      - id: 0x01
        name: receiverState
        type: enum
        required: true
        enum: [disabled, starting, ready, busy, failed]
        description: Receiver service availability state.
      - id: 0x02
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Receiver-local active session id.
      - id: 0x03
        name: receiverPhase
        type: enum
        required: true
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: Protocol-neutral receiver phase used by UI and reconnection calibration.
      - id: 0x04
        name: sessionState
        type: enum
        required: false
        enum: [idle, incoming, waitingForPassword, authenticated, preparing, casting, interrupted, stopping, ended, failed]
        description: AirPlay or backend-specific session state detail.
      - id: 0x05
        name: protocol
        type: enum
        required: false
        enum: [airplay, hid, unknown]
        description: Cast protocol path currently represented by this state.
      - id: 0x06
        name: airPlayName
        type: string
        required: false
        max_length: 128
        description: Current published AirPlay receiver display name.
      - id: 0x07
        name: source
        type: CastSourceSummary
        required: false
        description: Source device summary.
      - id: 0x08
        name: media
        type: CastMediaSummary
        required: false
        description: Low-frequency media summary.
      - id: 0x09
        name: backendState
        type: enum
        required: false
        enum: [starting, ready, restarting, exited, failed, disabled]
        description: Current backend state summary.
      - id: 0x0A
        name: reason
        type: enum
        required: false
        enum: [sessionStarted, mediaFlowStarted, externalRequest, sourceClosed, backendRestart, backendExited, authFailed, error, unknown]
        description: Last state transition reason.
      - id: 0x0B
        name: authRequired
        type: bool
        required: false
        description: Whether this session path currently requires authentication.
      - id: 0x0C
        name: updatedAt
        type: string
        required: false
        max_length: 64
        description: Timestamp for this state snapshot.

  CastStopSessionParams:
    kind: object
    description: Request to stop an active cast session.
    fields:
      - id: 0x01
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Optional receiver-local session id; omitted means current active session.
      - id: 0x02
        name: reason
        type: enum
        required: false
        enum: [externalRequest, localUi, backendRestart, shutdown, unknown]
        description: Caller-visible reason for stopping the session.
      - id: 0x03
        name: force
        type: bool
        required: false
        default: false
        description: Whether the receiver may force backend/session cleanup.

  CastStopSessionResult:
    kind: object
    description: Result of a cast session stop request.
    fields:
      - id: 0x01
        name: accepted
        type: bool
        required: true
        description: Whether the receiver accepted the stop request.
      - id: 0x02
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Session affected by the request.
      - id: 0x03
        name: previousReceiverPhase
        type: enum
        required: false
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: Receiver phase before the stop transition.
      - id: 0x04
        name: receiverPhase
        type: enum
        required: true
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: Receiver phase after accepting the stop request.
      - id: 0x05
        name: previousState
        type: enum
        required: false
        enum: [idle, incoming, waitingForPassword, authenticated, preparing, casting, interrupted, stopping, ended, failed]
        description: Backend-specific state before the stop transition.
      - id: 0x06
        name: sessionState
        type: enum
        required: false
        enum: [idle, incoming, waitingForPassword, authenticated, preparing, casting, interrupted, stopping, ended, failed]
        description: Backend-specific state after accepting the stop request.
      - id: 0x07
        name: reason
        type: enum
        required: false
        enum: [externalRequest, sourceClosed, backendRestart, backendExited, shutdown, unknown]
        description: Applied stop reason.
      - id: 0x08
        name: noActiveSession
        type: bool
        required: false
        description: Whether no active session existed when the request was processed.
      - id: 0x09
        name: updatedAt
        type: string
        required: false
        max_length: 64
        description: Timestamp for the result.

  CastSetAirPlayNameParams:
    kind: object
    description: Request to set the AirPlay receiver display name.
    fields:
      - id: 0x01
        name: displayName
        type: string
        required: true
        max_length: 128
        description: Target AirPlay display name.
      - id: 0x02
        name: apply
        type: enum
        required: false
        enum: [immediate, onNextBackendStart]
        description: Requested backend apply timing.

  CastAirPlayNameState:
    kind: object
    description: AirPlay display name and backend publish state.
    fields:
      - id: 0x01
        name: displayName
        type: string
        required: true
        max_length: 128
        description: Current AirPlay display name.
      - id: 0x02
        name: previousDisplayName
        type: string
        required: false
        max_length: 128
        description: Previous display name when a change was applied.
      - id: 0x03
        name: source
        type: enum
        required: false
        enum: [configured, default, backend, unknown]
        description: Source of the current display name.
      - id: 0x04
        name: apply
        type: enum
        required: false
        enum: [immediate, onNextBackendStart]
        description: Apply timing used for the latest update.
      - id: 0x05
        name: publishState
        type: enum
        required: true
        enum: [published, republishing, pending, failed, unpublished]
        description: Bonjour or backend service publish state.
      - id: 0x06
        name: backendType
        type: enum
        required: false
        enum: [uxplay, unknown]
        description: Backend that owns the published name.
      - id: 0x07
        name: updatedAt
        type: string
        required: false
        max_length: 64
        description: Timestamp for this name state.

  CastSessionIncomingEvent:
    kind: object
    description: Event payload for a new incoming cast session.
    fields:
      - id: 0x01
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Receiver-local session id assigned to the incoming session.
      - id: 0x02
        name: receiverPhase
        type: enum
        required: true
        enum: [incoming, authenticating]
        description: Receiver phase entered for the incoming session.
      - id: 0x03
        name: protocol
        type: enum
        required: false
        enum: [airplay, hid, unknown]
        description: Protocol path used by the incoming session.
      - id: 0x04
        name: source
        type: CastSourceSummary
        required: false
        description: Source summary when available.
      - id: 0x05
        name: authRequired
        type: bool
        required: false
        description: Whether this incoming session requires authentication.
      - id: 0x06
        name: incomingAt
        type: string
        required: false
        max_length: 64
        description: Timestamp when the incoming session was observed.

  CastSessionStateChangedEvent:
    kind: object
    description: Event payload for receiver phase or backend session state changes.
    fields:
      - id: 0x01
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Receiver-local session id.
      - id: 0x02
        name: previousReceiverPhase
        type: enum
        required: false
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: Previous receiver phase.
      - id: 0x03
        name: receiverPhase
        type: enum
        required: true
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: New receiver phase.
      - id: 0x04
        name: previousState
        type: enum
        required: false
        enum: [idle, incoming, waitingForPassword, authenticated, preparing, casting, interrupted, stopping, ended, failed]
        description: Previous backend-specific session state.
      - id: 0x05
        name: sessionState
        type: enum
        required: false
        enum: [idle, incoming, waitingForPassword, authenticated, preparing, casting, interrupted, stopping, ended, failed]
        description: New backend-specific session state.
      - id: 0x06
        name: protocol
        type: enum
        required: false
        enum: [airplay, hid, unknown]
        description: Protocol path represented by this event.
      - id: 0x07
        name: authRequired
        type: bool
        required: false
        description: Whether the current session phase requires authentication.
      - id: 0x08
        name: media
        type: CastMediaSummary
        required: false
        description: Low-frequency media summary at the time of transition.
      - id: 0x09
        name: reason
        type: enum
        required: false
        enum: [sessionStarted, mediaFlowStarted, externalRequest, sourceClosed, backendRestart, backendExited, authFailed, error, unknown]
        description: Transition reason.
      - id: 0x0A
        name: updatedAt
        type: string
        required: false
        max_length: 64
        description: Timestamp for the transition.

  CastSessionStartedEvent:
    kind: object
    description: Event payload for a user-visible cast session start.
    fields:
      - id: 0x01
        name: sessionId
        type: string
        required: true
