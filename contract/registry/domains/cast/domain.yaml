        name: lateFrames
        type: uint64
        required: false
        description: Low-frequency late-frame counter.
      - id: 0x0C
        name: keyframeRequestCount
        type: uint32
        required: false
        description: Internal keyframe requests triggered by receiver policy.
      - id: 0x0D
        name: keyFrameOnDropBurst
        type: bool
        required: false
        description: Whether the receiver may internally request a keyframe after a drop burst.
      - id: 0x0E
        name: changedFields
        type: array
        array:
          item_type: string
        required: false
        description: Field names changed by the latest operation or event.
      - id: 0x0F
        name: sampledAt
        type: string
        required: false
        max_length: 64
        description: Timestamp for this flow sample.

  CastFlowControlChangedEvent:
    kind: object
    description: Event payload for cast flow control changes or low-frequency diagnostic samples.
    fields:
      - id: 0x01
        name: changedFields
        type: array
        array:
          item_type: string
        required: true
        description: Field names changed or sampled by this event.
      - id: 0x02
        name: state
        type: CastFlowControlState
        required: true
        description: Flow control state after the change or sample.
      - id: 0x03
        name: reason
        type: enum
        required: false
        enum: [manualFlowControl, diagnosticsSample, sessionStarted, sessionStopped, unknown]
        description: Change or sampling reason.
      - id: 0x04
        name: sampledAt
        type: string
        required: false
        max_length: 64
        description: Timestamp for this event.

  CastGetStatusParams:
    kind: object
    description: Selector for current cast receiver snapshot.
    fields:
      - id: 0x01
        name: include
        type: array
        array:
          item_type: string
        required: false
        description: Optional status sections to include.
      - id: 0x02
        name: includeSensitive
        type: bool
        required: false
        default: false
        description: Whether authorized callers request sensitive summary fields.

  CastReceiverSummary:
    kind: object
    description: Snapshot receiver role and protocol-neutral phase summary.
    fields:
      - id: 0x01
        name: role
        type: enum
        required: true
        enum: [receiver]
        description: Cast endpoint role.
      - id: 0x02
        name: protocols
        type: array
        array:
          item_type: string
        required: true
        description: Supported or active cast protocol paths.
      - id: 0x03
        name: state
        type: enum
        required: true
        enum: [disabled, starting, ready, busy, failed]
        description: Receiver service availability state.
      - id: 0x04
        name: receiverPhase
        type: enum
        required: true
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: Protocol-neutral receiver phase.

  CastSessionStatusSummary:
    kind: object
    description: Snapshot active session summary for status views.
    fields:
      - id: 0x01
        name: sessionId
        type: string
        required: false
        max_length: 128
        description: Receiver-local session id.
      - id: 0x02
        name: receiverPhase
        type: enum
        required: false
        enum: [idle, incoming, authenticating, streamStarting, streaming, rendering, interrupted, stopping, ended, failed]
        description: Protocol-neutral receiver phase.
      - id: 0x03
        name: sessionState
        type: enum
        required: false
        enum: [idle, incoming, waitingForPassword, authenticated, preparing, casting, interrupted, stopping, ended, failed]
        description: Backend-specific session state.
      - id: 0x04
        name: protocol
        type: enum
        required: false
        enum: [airplay, hid, unknown]
        description: Protocol path represented by the active session.
      - id: 0x05
        name: sourceName
        type: string
        required: false
        max_length: 128
        description: User-visible source name.

  CastPinCodeStatusSummary:
    kind: object
    description: Snapshot PIN summary for status views.
    fields:
      - id: 0x01
        name: enabled
        type: bool
        required: true
        description: Whether PIN protection is enabled.
      - id: 0x02
        name: hasPinCode
        type: bool
        required: true
        description: Whether a current PIN exists.
      - id: 0x03
        name: pinDisplay
        type: enum
        required: false
        enum: [hidden, authorizedClients, localUi, both]
        description: Where the current PIN may be displayed.
      - id: 0x04
        name: pinCode
        type: string
        required: false
        description: Plaintext PIN value when visible to the caller.
      - id: 0x05
        name: redacted
        type: bool
        required: false
        description: Whether sensitive fields were withheld.
      - id: 0x06
        name: visibility
        type: enum
        required: false
        enum: [hidden, authorizedOnly, localUi, both]
        description: Visibility policy applied to this summary.

  CastStatus:
    kind: object
    description: Current cast receiver snapshot for reconnect and event-loss recovery.
    fields:
      - id: 0x01
        name: receiver
        type: CastReceiverSummary
        required: true
        description: Receiver role and phase summary.
      - id: 0x02
        name: session
        type: CastSessionStatusSummary
        required: false
        description: Active session summary.
      - id: 0x03
        name: pinCode
        type: CastPinCodeStatusSummary
        required: false
        description: PIN protection summary.
      - id: 0x04
        name: audio
        type: CastAudioState
        required: false
        description: Local audio summary.
      - id: 0x05
        name: window
        type: CastWindowState
        required: false
        description: Cast window summary.
      - id: 0x06
        name: backend
        type: CastBackendStatus
        required: false
        description: Backend summary.
      - id: 0x07
        name: flowControl
        type: CastFlowControlState
        required: false
        description: Flow control summary.
      - id: 0x08
        name: sampledAt
        type: string
        required: true
        max_length: 64
        description: Timestamp for this status snapshot.
      - id: 0x09
        name: redacted
        type: bool
        required: false
        description: Whether any sensitive snapshot fields were withheld.

  CastSessionCapability:
    kind: object
    description: Capability descriptor for cast.session.
    fields:
      - id: 0x01
        name: protocols
        type: array
        array:
          item_type: string
        required: true
        description: Cast protocol paths represented by the receiver.
      - id: 0x02
        name: receiverPhases
        type: array
        array:
          item_type: string
        required: true
        description: Supported protocol-neutral receiver phases.
      - id: 0x03
        name: supportsAirPlayName
        type: bool
        required: false
        default: true
        description: Whether AirPlay display name query and update are supported.
      - id: 0x04
        name: supportsStopSession
        type: bool
        required: false
        default: true
        description: Whether active cast sessions can be stopped through cast.stopSession.
      - id: 0x05
        name: backendTypes
        type: array
        array:
          item_type: string
        required: false
        description: Backend implementations represented by this receiver.

  CastAudioCapability:
    kind: object
    description: Capability descriptor for cast.audio.
    fields:
      - id: 0x01
        name: defaultEnabled
        type: bool
        required: false
        default: false
        description: Default local playback enablement for received cast audio.
      - id: 0x02
        name: supportsMute
        type: bool
        required: false
        default: true
        description: Whether local mute state can be controlled separately.
      - id: 0x03
        name: reportsEffectivePlayback
        type: bool
        required: false
        default: true
        description: Whether the receiver reports effective local playback state.

  CastPinCodeCapability:
    kind: object
    description: Capability descriptor for cast.pinCode.
    fields:
      - id: 0x01
        name: defaultEnabled
        type: bool
        required: false
        default: true
        description: Whether PIN protection is enabled by default.
      - id: 0x02
        name: supportsPlaintextResponse
        type: bool
        required: false
        default: true
        description: Whether authorized responses or events may carry plaintext PIN values.
      - id: 0x03
        name: supportedPinDisplays
        type: array
        array:
          item_type: string
        required: false
        description: PIN display policies supported by the receiver.
      - id: 0x04
        name: supportsGeneratedPin
        type: bool
        required: false
        default: true
        description: Whether the receiver can generate a default PIN.
      - id: 0x05
        name: redactionRequired
        type: bool
        required: false
        default: true
        description: Whether logs, diagnostics, and error summaries must redact PIN values.

  CastWindowCapability:
    kind: object
    description: Capability descriptor for cast.window.
    fields:
      - id: 0x01
        name: supportsFullscreen
        type: bool
        required: false
        default: true
        description: Whether fullscreen window mode is supported.
      - id: 0x02
        name: supportsAlwaysOnTop
        type: bool
        required: false
        default: true
        description: Whether topmost window state is supported.
      - id: 0x03
        name: supportsNormalRestore
        type: bool
        required: false
        default: true
        description: Whether normal mode can restore remembered normal-mode bounds.
      - id: 0x04
        name: noWindowPolicy
        type: enum
        required: false
        enum: [reject, remember, runtimeDefault]
        description: Receiver policy when a window command is received without an active cast window.

  CastBackendCapability:
    kind: object
    description: Capability descriptor for cast.backend.
    fields:
      - id: 0x01
        name: backendTypes
        type: array
        array:
          item_type: string
        required: true
        description: Backend implementations controlled by the receiver.
      - id: 0x02
        name: supportsRestart
        type: bool
        required: false
        default: true
        description: Whether cast.restartBackend is supported.
      - id: 0x03
        name: reportsProcess
        type: bool
        required: false
        default: true
        description: Whether backend process metadata such as pid may be reported.
      - id: 0x04
        name: supportsLastError
        type: bool
        required: false
        default: true
        description: Whether last backend error summaries are available.

  CastFlowControlCapability:
    kind: object
    description: Capability descriptor for cast.flowControl.
    fields:
      - id: 0x01
        name: supportsRenderFps
        type: bool
        required: false
        default: true
        description: Whether receiver-local target render fps can be controlled.
      - id: 0x02
        name: supportsQueuePolicy
        type: bool
        required: false
        default: true
        description: Whether queue and late-frame policy can be controlled.
      - id: 0x03
        name: supportsOverlay
        type: bool
        required: false
        default: true
        description: Whether diagnostics overlay can be controlled.
      - id: 0x04
        name: supportsStats
        type: bool
        required: false
        default: true
        description: Whether low-frequency flow diagnostics are reported.
      - id: 0x05
        name: exposesExternalKeyframeRequest
        type: bool
        required: false
        default: false
        description: Whether a public keyframe request method is exposed; current draft keeps this false.

  CastStatusCapability:
    kind: object
    description: Capability descriptor for cast.status snapshot query.
    fields:
      - id: 0x01
        name: sections
        type: array
        array:
          item_type: string
        required: true
        description: Status snapshot sections the receiver can report.
      - id: 0x02
        name: supportsSensitiveRedaction
        type: bool
        required: false
        default: true
        description: Whether sensitive status fields can be withheld and marked redacted.

capabilities:
  - id: 0x1601
    name: cast.session
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports cast receiver session phase, AirPlay name, and session stop control.
    type: object
    schema: CastSessionCapability

  - id: 0x1602
    name: cast.audio
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports local cast audio playback and mute control.
    type: object
    schema: CastAudioCapability

  - id: 0x1603
    name: cast.pinCode
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports cast PIN protection, PIN state, and authentication events.
    type: object
    schema: CastPinCodeCapability

  - id: 0x1604
    name: cast.window
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports cast window state query and mode control.
    type: object
    schema: CastWindowCapability

  - id: 0x1605
    name: cast.backend
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports cast backend status query and restart control.
    type: object
    schema: CastBackendCapability

  - id: 0x1606
    name: cast.flowControl
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports receiver-local cast render fps, queue, drop, overlay, and diagnostics control.
    type: object
    schema: CastFlowControlCapability

  - id: 0x1607
    name: cast.status
    domain: cast
    status: draft
    since: 1.0.0
    description: Device supports current cast receiver status snapshot query.
    type: object
    schema: CastStatusCapability
