  AudioStreamSourceStateChangedEvent:
    kind: object
    description: Event payload for audio stream source state changes.
    fields:
      - id: 0x01
        name: source
        type: string
        required: true
        max_length: 128
        description: Audio source identifier.
      - id: 0x02
        name: mediaKind
        type: enum
        required: false
        description: Media kind, normally audio.
      - id: 0x03
        name: state
        type: enum
        required: true
        description: New source state.
      - id: 0x04
        name: reason
        type: enum
        required: false
        description: Source state change reason.
      - id: 0x05
        name: activeStreamId
        type: uint32
        required: false
        description: Active downstream stream id, if any.

  AudioStreamStatsReportedEvent:
    kind: object
    description: Event payload for audio stream statistics reports.
    fields:
      - id: 0x01
        name: streamId
        type: uint32
        required: true
        description: STREAM data plane stream identifier.
      - id: 0x02
        name: stats
        type: AudioStreamStats
        required: true
        description: Bounded stream statistics.

  AudioStreamStats:
    kind: object
