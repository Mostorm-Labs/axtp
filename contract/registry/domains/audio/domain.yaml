        required: true
        description: Negotiated sample rate in Hz.
      - id: 0x08
        name: channels
        type: uint8
        required: true
        description: Negotiated channel count.
      - id: 0x09
        name: sampleFormat
        type: enum
        required: false
        description: Negotiated sample format.
      - id: 0x0A
        name: streamProfile
        type: string
        required: true
        max_length: 64
        description: Normalized stream profile.
      - id: 0x0B
        name: cursorUnit
        type: enum
        required: true
        description: STREAM cursor unit.
      - id: 0x0C
        name: syncGroupId
        type: string
        required: false
        max_length: 128
        description: Synchronization group identifier.
      - id: 0x0D
        name: castSessionId
        type: string
        required: false
        max_length: 128
        description: Cast session identifier.
      - id: 0x0E
        name: clockDomain
        type: string
        required: false
        max_length: 128
        description: Source media clock domain.
      - id: 0x0F
        name: receiverClockDomain
        type: string
        required: false
        max_length: 128
        description: Receiver clock domain.
      - id: 0x10
        name: maxDataSize
        type: uint32
        required: false
        description: Negotiated maximum STREAM payload data size.
      - id: 0x11
        name: audioPtsMode
        type: enum
        required: false
        description: Negotiated audio PTS mode.
      - id: 0x12
        name: timebase
        type: uint32
        required: false
        description: Negotiated audio PTS timebase in ticks per second.
      - id: 0x13
        name: samplesPerPacket
        type: uint32
        required: false
        description: Fixed samples consumed by each STREAM packet when packetizationMode is fixedSamplesPerPacket.
      - id: 0x14
        name: firstMediaSeqId
        type: uint32
        required: false
        description: First STREAM seqId used as the base for derived audio PTS.
      - id: 0x15
        name: audioPtsBase
        type: uint64
        required: false
