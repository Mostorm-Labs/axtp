      - id: 0x02
        name: state
        type: enum
        required: true
        description: New stream state.
      - id: 0x03
        name: source
        type: string
        required: true
        max_length: 128
        description: Bound audio source.
      - id: 0x04
        name: reason
        type: enum
        required: false
        description: State change reason.
      - id: 0x05
        name: stats
        type: AudioStreamStats
        required: false
