        description: Whether to include current source runtime state.

  AudioStreamCapabilities:
    kind: object
    description: Device-level audio.stream capability summary.
    fields:
      - id: 0x01
        name: capability
        type: string
        required: true
        max_length: 32
        description: Fixed capability name audio.stream.
      - id: 0x02
        name: sources
        type: array
        schema: AudioStreamSource
        required: true
        description: Audio stream source objects.
      - id: 0x03
        name: streamProfiles
        type: array
        array:
          item_type: string
        required: true
        description: Supported stream profiles, normally media.audio.
      - id: 0x04
        name: openModes
        type: array
        array:
          item_type: string
        required: true
        description: Supported open modes, such as producer_open and receiver_pull.
      - id: 0x05
        name: peerRoles
        type: array
        array:
          item_type: string
        required: true
        description: Peer roles, such as receiver and transmitter.
      - id: 0x06
        name: supportsSourceStateEvent
        type: bool
        required: true
        description: Whether audio.streamSourceStateChanged is supported.
      - id: 0x07
        name: supportsSyncGroup
        type: bool
        required: true
        description: Whether audio streams can share a synchronization group with video streams.
      - id: 0x08
        name: flowControlManagedByRuntime
        type: bool
        required: true
        description: Whether normal applications can rely on runtime-managed STREAM flow control.
      - id: 0x09
        name: aacTransportFormats
        type: array
        array:
          item_type: string
        required: false
        description: Optional AAC transport format strings; exact supported set remains product-confirmed.
      - id: 0x0A
        name: supportedAudioPtsModes
        type: array
        array:
          item_type: string
        required: false
        description: Optional audio PTS modes such as derivedFromSeq and explicit.
      - id: 0x0B
        name: supportedPacketizationModes
        type: array
        array:
          item_type: string
        required: false
        description: Optional audio packetization modes such as fixedSamplesPerPacket.
      - id: 0x0C
        name: supportsSourceCaptureTimestampCursor
        type: bool
        required: false
        description: Whether STREAM cursorUnit sourceCaptureTimestampUs is supported.

  AudioStreamSource:
    kind: object
    description: One real-time audio stream source.
    fields:
      - id: 0x01
        name: source
        type: string
        required: true
        max_length: 128
        description: Source identifier such as wireless_cast_audio.
      - id: 0x02
        name: displayName
        type: string
        required: false
        max_length: 128
        description: User-visible source name.
      - id: 0x03
        name: codecs
        type: array
        array:
          item_type: string
        required: true
        description: Supported audio codecs.
      - id: 0x04
        name: sampleRates
        type: array
        array:
          item_type: uint32
        required: false
        description: Supported sample rates in Hz.
      - id: 0x05
        name: channels
        type: array
        array:
          item_type: uint8
        required: false
        description: Supported channel counts.
      - id: 0x06
        name: state
        type: enum
        required: false
        description: Runtime source state, such as available, receiving, stopped, or unavailable.

  AudioOpenStreamParams:
    kind: object
    description: Request to open a real-time audio stream.
    fields:
      - id: 0x01
        name: source
        type: string
        required: true
        max_length: 128
        description: Audio source identifier.
      - id: 0x02
        name: peerRole
        type: enum
        required: true
        description: Requested peer media role; values include receiver and transmitter.
      - id: 0x03
        name: codec
        type: enum
        required: true
        description: Requested audio codec, such as aac, opus, or pcm.
      - id: 0x04
        name: transportFormat
        type: enum
        required: false
        description: Optional codec transport format, such as adts, latm, or raw_aac.
      - id: 0x05
        name: sampleRate
        type: uint32
        required: false
        description: Requested sample rate in Hz.
      - id: 0x06
        name: channels
        type: uint8
        required: false
        description: Requested channel count.
      - id: 0x07
        name: sampleFormat
        type: enum
        required: false
        description: Requested sample format.
      - id: 0x08
        name: chunkDurationMs
        type: uint32
        required: false
        description: Preferred chunk duration in milliseconds.
      - id: 0x09
        name: streamProfile
        type: string
        required: false
        max_length: 64
        default: media.audio
        description: STREAM profile name.
      - id: 0x0A
        name: cursorUnit
        type: enum
        required: false
        description: STREAM cursor unit, such as timestampUs or sampleIndex.
      - id: 0x0B
        name: syncGroupId
        type: string
        required: false
        max_length: 128
        description: Optional synchronization group identifier.
      - id: 0x0C
        name: castSessionId
        type: string
        required: false
        max_length: 128
        description: Optional cast session identifier.
      - id: 0x0D
        name: clockDomain
        type: string
        required: false
        max_length: 128
        description: Source media clock domain.
      - id: 0x0E
        name: receiverClockDomain
        type: string
        required: false
        max_length: 128
        description: Receiver clock domain.
      - id: 0x0F
        name: maxDataSize
        type: uint32
        required: false
        description: Preferred maximum STREAM payload data size.
      - id: 0x10
        name: audioPtsMode
        type: enum
        required: false
        default: derivedFromSeq
        description: Audio PTS mode; NA20/NT10 MVP uses derivedFromSeq.
      - id: 0x11
        name: timebase
        type: uint32
        required: false
        default: 48000
        description: Audio PTS timebase in ticks per second.
      - id: 0x12
        name: samplesPerPacket
        type: uint32
        required: false
        default: 1024
        description: Fixed samples consumed by each STREAM packet when packetizationMode is fixedSamplesPerPacket.
      - id: 0x13
        name: firstMediaSeqId
        type: uint32
        required: false
        default: 0
        description: First STREAM seqId used as the base for derived audio PTS.
      - id: 0x14
        name: audioPtsBase
        type: uint64
        required: false
        default: 0
        description: Audio PTS value corresponding to firstMediaSeqId.
      - id: 0x15
        name: packetizationMode
        type: enum
        required: false
        default: fixedSamplesPerPacket
        description: Audio packetization mode; NA20/NT10 MVP uses fixedSamplesPerPacket.

