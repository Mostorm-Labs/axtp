  AudioStreamState:
    kind: object
    description: Runtime state of one audio stream.
    fields:
      - id: 0x01
        name: streamId
        type: uint32
        required: true
        description: STREAM data plane stream identifier.
      - id: 0x02
        name: state
        type: enum
        required: true
        description: Stream state, such as opening, streaming, closing, closed, or failed.
      - id: 0x03
        name: source
        type: string
        required: true
        max_length: 128
        description: Bound audio source.
      - id: 0x04
        name: peerRole
        type: enum
        required: false
        description: Peer media role.
      - id: 0x05
        name: codec
        type: enum
        required: false
        description: Negotiated audio codec.
      - id: 0x06
        name: streamProfile
        type: string
        required: false
        max_length: 64
        description: Stream profile.
      - id: 0x07
        name: syncGroupId
        type: string
        required: false
        max_length: 128
        description: Synchronization group identifier.
      - id: 0x08
        name: cursorUnit
        type: enum
        required: false
        description: STREAM cursor unit.
      - id: 0x09
        name: lastCursor
        type: uint64
        required: false
        description: Last known cursor value.
