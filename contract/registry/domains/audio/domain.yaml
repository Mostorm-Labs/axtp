        name: source
        type: string
        required: true
        max_length: 128
        description: Audio source identifier.
      - id: 0x02
        name: mediaKind
        type: enum
        required: false
        description: Media kind, normally audio.
      - id: 0x03
        name: state
        type: enum
        required: true
        description: Source state, such as unavailable, available, receiving, stopped, or failed.
