axtp_spec:
  version: "{{VERSION}}"
  tag: "spec/v{{VERSION}}"
  commit: "{{COMMIT}}"
  released_at: "{{DATE}}"

contents:
  contract_paths:
    - README.md
    - LICENSE
    - protocol/axtp.protocol.yaml
    - docs/generated/protocol.md
    - docs/generated/protocol.json
    - registry/
    - docs/specs/
    - docs/conformance/
    - tooling/mcp/
    - tooling/test-vectors/
  compatibility_paths:
    - conformance/
  supplemental_paths:
    - ROADMAP.md
    - CHANGELOG.md
    - docs/release/
    - docs/legacy-migration/
  excluded_paths:
    - docs/legacy-migration/evidence/
    - "**/.DS_Store"

runtime_update:
  target_runtime_version: "{{VERSION}}"
  dispatch_event: "axtp_spec_released"

notes:
  summary: ""
  breaking_changes: []
  runtime_required_changes: []
