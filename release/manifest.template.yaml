axtp_spec:
  version: "{{VERSION}}"
  tag: "spec/v{{VERSION}}"
  commit: "{{COMMIT}}"
  released_at: "{{DATE}}"

contents:
  specs: true
  registry: true
  schemas: true
  conformance: true
  migration: true

runtime_update:
  target_runtime_version: "{{VERSION}}"
  dispatch_event: "axtp_spec_released"

notes:
  summary: ""
  breaking_changes: []
  runtime_required_changes: []
