profiles:
  - name: AXTP-MVP
    since: 1.0.0
    status: stable
    requiredMethods: &a1
      - device.getInfo
      - capability.supportedMethods
      - firmware.begin
      - firmware.end
      - firmware.verify
      - firmware.apply
      - display.getBrightness
      - display.setBrightness
    requiredEvents: &a2
      - firmware.updateProgress
      - firmware.updateCompleted
      - firmware.updateFailed
      - display.brightnessChanged
    requiredErrors: &a3
      - SUCCESS
      - RPC_METHOD_NOT_FOUND
      - RPC_PARAM_INVALID
      - STREAM_NOT_FOUND
      - STREAM_CRC_ERROR
      - BUSY
    transportProfiles:
      - AXTP-USB-HID
      - AXTP-TCP
      - AXTP-WS-JSON
      - AXTP-WS-CLOUD-REVERSE
    frameProfiles:
      - STANDARD_FRAME
  - name: AXTP-MVP-HID
    since: 1.0.0
    status: stable
    extends: AXTP-MVP
    requiredMethods: *a1
    requiredEvents: *a2
    requiredErrors: *a3
    transportProfiles:
      - AXTP-USB-HID
    frameProfile: STANDARD_FRAME
  - name: AXTP-HID-MEDIA
    since: 1.0.0
    status: draft
    extends: AXTP-MVP-HID
    requiredMethods:
      - stream.open
    requiredEvents:
      - stream.opened
      - stream.error
    requiredErrors:
      - SUCCESS
      - BUSY
      - RPC_PARAM_INVALID
      - MEDIA_SOURCE_NOT_FOUND
      - MEDIA_SOURCE_UNAVAILABLE
      - MEDIA_CODEC_UNSUPPORTED
      - MEDIA_STREAM_START_FAILED
    requiredTypes:
      - StreamOpenRequest
      - StreamOpenResponse
      - StreamOpenedEvent
      - StreamErrorEvent
      - StreamHidMediaCapability
    transportProfiles:
      - AXTP-USB-HID
    frameProfile: STANDARD_FRAME
